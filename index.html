<script>
var ECOS_KEY = 'ZV9F4SG308AAQ8GMQR35';
var FSS_KEY  = '0d953c04697cc4a0da0de7d301623d1c';

window.__live = {
  loading:true, fredLive:false, ecosLive:false, fssLive:false, imfLive:false,
  fred:  { fedRate:4.25, rate2y:4.18, rate10y:4.52, rate30y:4.73,

  fss:   { foreignStock:[], corsBlocked:false },
  imf:   { gdp:{}, bop:{} },
  lastUpdated: null,
};

function fredFetch(series) {
  return fetch('https://fred.stlouisfed.org/graph/fredgraph.csv?id='+series)
    .then(function(r){ return r.text(); })
    .then(function(t){
      var lines=t.trim().split('\n');
      for(var i=lines.length-1;i>=1;i--){
        var p=lines[i].split(',');
        if(p[1]&&p[1].trim()!=='.'&&!isNaN(parseFloat(p[1])))return parseFloat(p[1]);
      }
      return null;
    }).catch(function(){return null;});
}

function loadFred() {
  Promise.all([
    fredFetch('FEDFUNDS'),fredFetch('DGS2'),fredFetch('DGS10'),fredFetch('DGS30'),
    fredFetch('UNRATE'),fredFetch('CPIAUCSL'),fredFetch('A191RL1Q225SBEA'),
    fredFetch('DGS1MO'),fredFetch('DGS3MO'),fredFetch('DGS6MO'),fredFetch('DGS1'),fredFetch('DGS5'),
  ]).then(function(v){
    var lv=window.__live;
    if(v[0])lv.fred.fedRate=v[0];
    if(v[1])lv.fred.rate2y=v[1];
    if(v[2])lv.fred.rate10y=v[2];
    if(v[3])lv.fred.rate30y=v[3];
    if(v[4])lv.fred.unemployment=v[4];
    if(v[5])lv.fred.cpi=v[5];
    if(v[6])lv.fred.gdpGrowth=v[6];
    lv.fred.yields=[v[7]||4.32,v[8]||4.30,v[9]||4.28,v[10]||4.22,v[1]||4.18,v[11]||4.35,v[2]||4.52,v[3]||4.73];
    lv.fredLive=true; lv.lastUpdated=new Date();
    console.log('[FRED] fedRate:'+lv.fred.fedRate+' 10Y:'+lv.fred.rate10y);
  }).catch(function(e){console.warn('[FRED]',e);});
}

function ecosFetch(statCode,cycle,startDate,endDate,itemCode1){
  if(!ECOS_KEY)return Promise.resolve(null);
  var url='https://ecos.bok.or.kr/api/StatisticSearch/'+ECOS_KEY
    +'/json/kr/1/100/'+statCode+'/'+cycle+'/'+startDate+'/'+endDate
    +(itemCode1?'/'+itemCode1:'');
  return fetch(url,{method:'GET',headers:{Accept:'application/json'}})
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(d){
      if(d.RESULT){console.warn('[ECOS]',d.RESULT.CODE,d.RESULT.MESSAGE);return null;}
      if(!d.StatisticSearch)return null;
      return d.StatisticSearch.row||[];
    }).catch(function(e){console.warn('[ECOS]'+statCode+':',e.message);return null;});
}

function loadEcos(){
  if(!ECOS_KEY)return;
  var now=new Date();
  var endYM=now.getFullYear()+('0'+(now.getMonth()+1)).slice(-2);
  var startYM=(now.getFullYear()-2)+'01';
  Promise.all([
    ecosFetch('060Y002','M',startYM,endYM,'00'),
    ecosFetch('722Y001','M',startYM,endYM,'0101000'),
    ecosFetch('301Y013','M',startYM,endYM,'010000000'),
    ecosFetch('062Y003','Q',(now.getFullYear()-2)+'Q1',now.getFullYear()+'Q'+(Math.ceil((now.getMonth()+1)/3))),
  ]).then(function(v){
    var bop=v[0],rate=v[1],fx=v[2],fdi=v[3],lv=window.__live;
    if(bop)lv.ecos.bopMonthly=bop.map(function(r){return{date:r.TIME,value:parseFloat(r.DATA_VALUE)};}).filter(function(r){return!isNaN(r.value);});
    if(rate&&rate.length>0)lv.ecos.baseRate=parseFloat(rate[rate.length-1].DATA_VALUE);
    if(fx&&fx.length>0)lv.ecos.fxReserves=parseFloat(fx[fx.length-1].DATA_VALUE);
    if(fdi)lv.ecos.fdiInflow=fdi.map(function(r){return{date:r.TIME,value:parseFloat(r.DATA_VALUE)};}).filter(function(r){return!isNaN(r.value);});
    lv.ecosLive=true; lv.lastUpdated=new Date();
    console.log('[ECOS] baseRate:'+lv.ecos.baseRate+' BOP months:'+lv.ecos.bopMonthly.length);
  }).catch(function(e){console.warn('[ECOS] 전체:',e);});
}

function loadFss(){
  if(!FSS_KEY)return;
  var now=new Date();
  var end=now.toISOString().slice(0,10).replace(/-/g,'');
  var start=new Date(now.getFullYear(),now.getMonth()-6,1).toISOString().slice(0,10).replace(/-/g,'');
  fetch('https://www.fss.or.kr/fss/kr/openApi/api/invtTrend.jsp?apiType=json&startDate='+start+'&endDate='+end+'&authKey='+FSS_KEY)
    .then(function(r){return r.json();})
    .then(function(d){
      var items=(d.invtTrend&&d.invtTrend.item)?d.invtTrend.item:[];
      if(!Array.isArray(items))items=[items];
      var monthly={};
      items.forEach(function(row){
        if(!row||!row.trdDd)return;
        var ym=String(row.trdDd).slice(0,6);
        if(!monthly[ym])monthly[ym]={s:0,b:0};
        monthly[ym].s+=parseFloat(row.stckNetBuyAmt||row.netBuyAmt||0);
        monthly[ym].b+=parseFloat(row.bondNetBuyAmt||0);
      });
      var arr=Object.keys(monthly).sort().map(function(ym){
        var m=monthly[ym];
        return{date:ym,stockNet:+(m.s/100000000).toFixed(1),bondNet:+(m.b/100000000).toFixed(1),totalNet:+((m.s+m.b)/100000000).toFixed(1)};
      });
      window.__live.fss.foreignStock=arr;
      window.__live.fssLive=arr.length>0||items.length>0;
      window.__live.lastUpdated=new Date();
      console.log('[FSS] '+arr.length+'개월 데이터');
    })
    .catch(function(e){console.warn('[FSS]:',e.message);window.__live.fss.corsBlocked=true;});
}

function loadImf(){
  var CTRY='USA,KOR,JPN,CHN,DEU,GBR,AUS,CAN,IND';
  var MAP={USA:'us',KOR:'kr',JPN:'jp',CHN:'cn',DEU:'eu',GBR:'gb',AUS:'au',CAN:'ca',IND:'in'};
  ['NGDP_RPCH','BCA_NGDPD'].forEach(function(s){
    fetch('https://www.imf.org/external/datamapper/api/v1/'+s+'?periods=2024&countries='+CTRY)
      .then(function(r){return r.json();})
      .then(function(d){
        if(!d.values||!d.values[s])return;
        var vals=d.values[s],key=s==='NGDP_RPCH'?'gdp':'bop';
        Object.keys(MAP).forEach(function(c){
          if(vals[c]&&vals[c]['2024'])window.__live.imf[key][MAP[c]]=parseFloat(vals[c]['2024']);
        });
        window.__live.imfLive=true;
        console.log('[IMF]',s,'loaded');
      }).catch(function(e){console.warn('[IMF]',s,e.message);});
  });
}

loadFred(); loadEcos(); loadFss(); loadImf();
setInterval(loadFred,300000); setInterval(loadEcos,600000);
</script>

function buildMonths(n=24){
  const now=new Date(),arr=[];
  for(let i=n-1;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    arr.push({year:d.getFullYear(),mo:d.getMonth(),
      label:`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}`,isCurrent:i===0});
  }
  return arr;
}

function seededRand(seed){let s=seed%2147483647;if(s<=0)s+=2147483646;return()=>{s=s*16807%2147483647;return(s-1)/2147483646;};}
function genFlow(base,phase,trend,n=24){
  const r=seededRand(Math.round(base*100+phase*10));
  return Array.from({length:n},(_,i)=>{
    const seasonal=Math.sin((i/12)*2*Math.PI+phase)*base*0.22;
    const trendV=(i/n)*trend;
    const noise=(r()-0.5)*base*0.10;
    return Math.round(Math.max(15,base+seasonal+trendV+noise));
  });
}

function seededR(seed){let s=seed%2147483647;if(s<=0)s+=2147483646;return()=>{s=s*16807%2147483647;return(s-1)/2147483646;};}
function corrColor(v){
  if(v>0.7)return"#00e676";if(v>0.4)return"#4caf50";if(v>0.1)return"#8bc34a";
  if(v>-0.1)return"#5a6a7a";if(v>-0.4)return"#ff7043";if(v>-0.7)return"#f44336";
  return"#ff1744";
}
function fmtNum(v,dec){if(v==null)return"—";const n=parseFloat(v);return isNaN(n)?"—":n.toFixed(dec==null?2:dec);}

function TV({type,opts,height}){
  const ref=useRef(null);
  const uid=useRef("tv_"+Math.random().toString(36).slice(2));
  useEffect(()=>{
    if(!ref.current)return;
    ref.current.innerHTML="";
    const w=document.createElement("div");w.id=uid.current;ref.current.appendChild(w);
    const s=document.createElement("script");
    s.src=`https://s3.tradingview.com/external-embedding/embed-widget-${type}.js`;
    s.async=true;
    s.innerHTML=JSON.stringify({...opts,container_id:uid.current,width:"100%",height,colorTheme:"dark",locale:"kr",isTransparent:true});
    w.appendChild(s);
    return()=>{if(ref.current)ref.current.innerHTML="";};
  },[]);
  return <div ref={ref} style={{width:"100%",height,overflow:"hidden"}}/>;
}

function Spark({data,width=80,height=26}){
  if(!data||data.length<2)return null;
  const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*width},${height-((v-mn)/rng)*(height-4)-2}`).join(" ");
  const up=data[data.length-1]>=data[0];
  return(
    <svg width={width} height={height} style={{display:"block"}}>
      <polyline points={pts} fill="none" stroke={up?C.green:C.red} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
      <circle cx={(data.length-1)/(data.length-1)*width} cy={height-((data[data.length-1]-mn)/rng)*(height-4)-2} r="2.5" fill={up?C.green:C.red}/>
    </svg>
  );
}

function Particle({from,to,speed,color,maxR,opacity}){
  const prog=useRef(Math.random());
  const [p,setP]=useState(prog.current);
  useEffect(()=>{
    let raf,last=performance.now();
    const tick=now=>{prog.current=(prog.current+(now-last)/1000*speed)%1;last=now;setP(prog.current);raf=requestAnimationFrame(tick);};
    raf=requestAnimationFrame(tick);return()=>cancelAnimationFrame(raf);
  },[speed]);
  const x=from.x+(to.x-from.x)*p,y=from.y+(to.y-from.y)*p;
  const r=(maxR||4)*(0.4+(1-Math.abs(p-0.5)*2)*0.6);
  return <circle cx={`${x*100}%`} cy={`${y*100}%`} r={r} fill={color} opacity={(opacity||0.65)*(0.4+p*0.6)}/>;
}

function Box({title,badge,children,style}){
  return(
    <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:6,overflow:"hidden",...style}}>
      <div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:11,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:C.muted,padding:"8px 12px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span>{title}</span>{badge&&<span>{badge}</span>}
      </div>
      {children}
    </div>
  );
}

          {live.fssLive&&fss.foreignStock&&fss.foreignStock.length>0?(
            <div style={{display:"flex",flexDirection:"column",gap:0}}>
              {/* 월별 미니 바차트 */}
              <div style={{display:"flex",alignItems:"flex-end",gap:2,height:50,marginBottom:4}}>
                {fss.foreignStock.slice(-12).map((m,i)=>{
                  const arr=fss.foreignStock.slice(-12);
                  const maxA=Math.max(...arr.map(x=>Math.abs(x.stockNet||0)))||1;
                  const h=Math.abs((m.stockNet||0)/maxA*44);
                  const isPos=(m.stockNet||0)>=0;
                  return(
                    <div key={i} title={`${m.date}: ${m.stockNet}억`} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>

                        transform:"rotate(-50deg) translateY(-2px)",opacity:0.8}}>{m.stockNet}</div>
                      <div style={{width:"100%",height:Math.max(h,2),background:isPos?C.accent:C.red,
                        borderRadius:"2px 2px 0 0",opacity:.75}}/>
                      <div style={{fontSize:5.5,color:C.dim,fontFamily:"JetBrains Mono",
                        transform:"rotate(-40deg)",whiteSpace:"nowrap",marginTop:1}}>
                        {String(m.date).slice(4,6)}

                    </div>
                  );
                })}
              </div>
              {/* 최신 3개월 요약 */}
              <div style={{display:"flex",gap:10}}>
                {fss.foreignStock.slice(-3).reverse().map((m,i)=>(
                  <div key={m.date} style={{display:"flex",gap:5,alignItems:"center"}}>
                    <span style={{fontSize:7,color:C.dim,fontFamily:"JetBrains Mono"}}>
                      {String(m.date).slice(0,4)}.{String(m.date).slice(4,6)}
                    </span>
                    <span style={{fontSize:9,color:(m.totalNet||0)>=0?C.green:C.red,fontWeight:700,fontFamily:"JetBrains Mono"}}>
                      {(m.totalNet||0)>=0?"+":""}{m.totalNet||0}억
                    </span>
                  </div>
                ))}
                {ecos.baseRate&&(
                  <span style={{marginLeft:"auto",fontSize:8,color:C.gold,fontFamily:"JetBrains Mono"}}>
                    BOK {ecos.baseRate}% (ECOS)
                  </span>
                )}
              </div>
            </div>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {[
                {label:"2025.02",v:"+4,820억",c:C.green},{label:"2025.01",v:"-1,240억",c:C.red},{label:"2024.12",v:"+2,150억",c:C.green}
              ].map(m=>(
                <div key={m.label} style={{display:"flex",gap:8,alignItems:"center"}}>
                  <span style={{fontSize:7.5,color:C.dim,fontFamily:"JetBrains Mono"}}>{m.label}</span>
                  <span style={{fontSize:9,color:m.c,fontWeight:700,fontFamily:"JetBrains Mono"}}>{m.v}</span>
                  <span style={{fontSize:7,color:C.dim,fontFamily:"JetBrains Mono"}}>(FSS 연결 시 실데이터)</span>
                </div>
              ))}

        </div>

        {/* ECOS 경상수지 */}
        {live.ecosLive&&ecos.bopMonthly&&ecos.bopMonthly.length>0&&(
          <div style={{flex:"0 0 auto",borderLeft:`1px solid ${C.border}`,padding:"8px 14px",minWidth:180}}>
            <div style={{fontSize:8,color:C.gold,fontFamily:"JetBrains Mono",fontWeight:700,marginBottom:7}}>
              🇰🇷 경상수지 (ECOS LIVE)
            </div>
            {ecos.bopMonthly.slice(-4).reverse().map((m,i)=>(
              <div key={m.date} style={{display:"flex",justifyContent:"space-between",marginBottom:4,padding:"3px 6px",

                <span style={{fontSize:9,color:m.value>=0?C.green:C.red,fontWeight:i===0?700:400,fontFamily:"JetBrains Mono"}}>

                </span>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════
   📈 YIELD CURVE PANEL (인터랙티브)
════════════════════════════════════════════ */
function YieldCurvePanel({regionsLive,live,fred}){
  const DURATIONS=["1M","3M","6M","1Y","2Y","5Y","10Y","30Y"];
  const [hovId,setHovId]=useState(null);
  const [hovDur,setHovDur]=useState(null);

  const CW=620,CH=240,PL=44,PR=14,PT=16,PB=32;
  const gW=CW-PL-PR,gH=CH-PT-PB;

  // US는 FRED 실데이터 우선
  const regions=regionsLive.map(function(r){
    if(r.id==="us"&&live.fredLive&&fred.yields&&fred.yields.some(function(v){return v>0;})){
      return Object.assign({},r,{yields:fred.yields});
    }
    return r;
  }).filter(function(r){return r.yields&&r.yields.filter(function(v){return v>0;}).length>2;});

  const allVals=[];
  regions.forEach(function(r){r.yields.forEach(function(v){if(v>0)allVals.push(v);});});
  const yMin=allVals.length?Math.floor((Math.min.apply(null,allVals)-0.3)*2)/2:0;
  const yMax=allVals.length?Math.ceil((Math.max.apply(null,allVals)+0.3)*2)/2:8;
  const yRange=yMax-yMin||1;

  function xOf(i){return PL+(i/(DURATIONS.length-1))*gW;}
  function yOf(v){return PT+(1-(v-yMin)/yRange)*gH;}

  function getPath(ylds){
    return ylds.map(function(v,i){return(i===0?"M":"L")+xOf(i).toFixed(1)+" "+yOf(v).toFixed(1);}).join(" ");
  }

  const yTicks=[];
  for(var y=Math.ceil(yMin*2)/2;y<=yMax;y=Math.round((y+0.5)*100)/100)yTicks.push(y);

  function handleMove(e){
    var rect=e.currentTarget.getBoundingClientRect();
    var mx=e.clientX-rect.left;
    var best=0,bestD=9999;
    DURATIONS.forEach(function(_,i){var d=Math.abs(mx-xOf(i));if(d<bestD){bestD=d;best=i;}});
    setHovDur(best);
  }

  return(
    <div>
      {/* 범례 */}
      <div style={{padding:"7px 12px",borderBottom:`1px solid ${C.border}`,display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
        <span style={{fontSize:7.5,color:C.dim,fontFamily:"JetBrains Mono",marginRight:4}}>수익률 곡선 ·</span>
        {regions.map(function(r){
          const isH=hovId===r.id,inv=r.yields[6]<r.yields[4];
          return(
            <div key={r.id} onMouseEnter={function(){setHovId(r.id);}} onMouseLeave={function(){setHovId(null);}}
              style={{display:"flex",alignItems:"center",gap:4,padding:"2px 7px",borderRadius:3,cursor:"pointer",
                background:isH?r.color+"1a":"transparent",border:`1px solid ${isH?r.color:r.color+"44"}`,transition:"all .12s"}}>
              <span style={{fontSize:11,lineHeight:1}}>{r.flag}</span>
              <span style={{fontSize:8,color:isH?r.color:C.muted,fontFamily:"JetBrains Mono",fontWeight:isH?700:400}}>{r.name}</span>
              <span style={{fontSize:8.5,color:r.color,fontFamily:"JetBrains Mono",fontWeight:700}}>{r.policyRate}%</span>
              {inv&&<span style={{fontSize:6.5,color:C.red}}>⚠</span>}
              {r.id==="us"&&live.fredLive&&<span style={{fontSize:6,color:C.green}}>●</span>}
              {r.id==="kr"&&live.ecosLive&&<span style={{fontSize:6,color:C.gold}}>●</span>}
            </div>
          );
        })}
      </div>

      {/* SVG */}
      <div style={{padding:"4px 12px 0"}}>
        <svg width={CW} height={CH} style={{display:"block",maxWidth:"100%"}}
          onMouseMove={handleMove} onMouseLeave={function(){setHovDur(null);}}>

          {yTicks.map(function(y,i){
            const yp=yOf(y);
            return(
              <g key={i}>
                <line x1={PL} y1={yp} x2={CW-PR} y2={yp} stroke={C.border} strokeWidth="0.5" strokeDasharray="3,3"/>
                <text x={PL-5} y={yp+3.5} textAnchor="end" fill={C.dim} fontSize="8" fontFamily="JetBrains Mono">{y.toFixed(1)}</text>
              </g>
            );
          })}

          {DURATIONS.map(function(d,i){
            const xp=xOf(i),isH=hovDur===i;
            return(
              <g key={i}>
                <line x1={xp} y1={PT} x2={xp} y2={PT+gH} stroke={isH?C.accent+"88":C.border} strokeWidth={isH?1:0.5}/>
                <text x={xp} y={CH-4} textAnchor="middle" fill={isH?C.accent:C.dim} fontSize="8.5" fontFamily="JetBrains Mono" fontWeight={isH?"700":"400"}>{d}</text>
              </g>
            );
          })}

          {regions.map(function(r){
            const isH=hovId===r.id,isFade=hovId!==null&&!isH;
            const inv=r.yields[6]<r.yields[4],stroke=inv?C.red:r.color;
            const d=getPath(r.yields);
            return(
              <g key={r.id} onMouseEnter={function(){setHovId(r.id);}} onMouseLeave={function(){setHovId(null);}} style={{cursor:"pointer"}}>
                <path d={d} fill="none" stroke="transparent" strokeWidth="12"/>
                <path d={d} fill="none" stroke={stroke} strokeWidth={isH?2.8:1.5} strokeLinejoin="round" strokeLinecap="round"
                  opacity={isFade?0.1:isH?1:0.65} style={{transition:"opacity .15s,stroke-width .1s"}}/>
                {r.yields.map(function(v,i){
                  const cx=xOf(i),cy=yOf(v),isDH=hovDur===i;
                  return <circle key={i} cx={cx} cy={cy} r={isH?(isDH?5:3.5):isDH?2.5:2}
                    fill={stroke} opacity={isFade?0.1:isH?1:isDH?0.9:0.55} style={{transition:"r .1s"}}/>;
                })}
                {isH&&(
                  <text x={xOf(DURATIONS.length-1)+5} y={yOf(r.yields[DURATIONS.length-1])+4}
                    fill={stroke} fontSize="8.5" fontFamily="JetBrains Mono" fontWeight="700">
                    {r.flag}{r.name}
                  </text>
                )}
              </g>
            );
          })}

          {hovDur!==null&&regions.map(function(r){
            const v=r.yields[hovDur];if(!v||v<=0)return null;
            const isH=hovId===r.id||hovId===null,xp=xOf(hovDur),yp=yOf(v);
            const inv=r.yields[6]<r.yields[4];
            return(
              <g key={r.id} opacity={isH?1:0.15}>
                <rect x={xp+5} y={yp-9} width={38} height={13} rx="2" fill={C.panel} stroke={inv?C.red:r.color} strokeWidth="0.8" opacity="0.95"/>
                <text x={xp+24} y={yp+1.5} textAnchor="middle" fill={inv?C.red:r.color} fontSize="8" fontFamily="JetBrains Mono" fontWeight="700">{v.toFixed(2)}%</text>
              </g>
            );
          })}

          <line x1={PL} y1={PT} x2={PL} y2={PT+gH} stroke={C.border} strokeWidth="1"/>
          <line x1={PL} y1={PT+gH} x2={CW-PR} y2={PT+gH} stroke={C.border} strokeWidth="1"/>
        </svg>
      </div>

      {/* 테이블 */}
      <div style={{overflowX:"auto",padding:"0 12px 10px"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontFamily:"JetBrains Mono",fontSize:8.5}}>
          <thead>
            <tr style={{borderBottom:`1px solid ${C.border}`}}>
              <th style={{padding:"4px 8px",textAlign:"left",color:C.muted,fontWeight:700,fontSize:7.5,whiteSpace:"nowrap"}}>국가</th>
              <th style={{padding:"4px 6px",textAlign:"center",color:C.accent,fontWeight:700,fontSize:7.5}}>기준금리</th>
              {DURATIONS.map(function(d,i){
                return(
                  <th key={d} onMouseEnter={function(){setHovDur(i);}} onMouseLeave={function(){setHovDur(null);}}
                    style={{padding:"4px 5px",textAlign:"center",cursor:"pointer",
                      color:hovDur===i?C.accent:C.muted,fontWeight:hovDur===i?700:400,fontSize:7.5,
                      background:hovDur===i?C.accent+"0d":"transparent",transition:"all .1s"}}>{d}</th>
                );
              })}
              <th style={{padding:"4px 6px",textAlign:"center",color:C.muted,fontWeight:700,fontSize:7.5}}>2Y↔10Y</th>
            </tr>
          </thead>
          <tbody>
            {regions.map(function(r,ri){
              const inv=r.yields[6]<r.yields[4];
              const spread=r.yields[6]&&r.yields[4]?+(r.yields[6]-r.yields[4]).toFixed(2):null;
              const isH=hovId===r.id;
              return(
                <tr key={r.id} onMouseEnter={function(){setHovId(r.id);}} onMouseLeave={function(){setHovId(null);}}
                  style={{background:isH?r.color+"10":ri%2===0?"transparent":C.panel2+"88",
                    borderBottom:`1px solid ${C.border}55`,cursor:"pointer",transition:"background .12s"}}>
                  <td style={{padding:"5px 8px",whiteSpace:"nowrap"}}>
                    <div style={{display:"flex",alignItems:"center",gap:5}}>
                      <span style={{fontSize:13}}>{r.flag}</span>
                      <div>
                        <div style={{color:isH?r.color:C.text,fontWeight:isH?700:400}}>{r.name}</div>
                        <div style={{fontSize:7,color:C.dim}}>{r.cbName}</div>
                      </div>
                    </div>
                  </td>
                  <td style={{padding:"5px 6px",textAlign:"center"}}>
                    <span style={{fontSize:10,fontWeight:700,color:r.color,background:r.color+"1a",
                      borderRadius:3,padding:"1px 5px"}}>{r.policyRate}%</span>
                  </td>
                  {r.yields.map(function(v,i){
                    const isDH=hovDur===i;
                    return(
                      <td key={i} style={{padding:"5px 4px",textAlign:"center",
                        background:isDH?C.accent+"0d":"transparent",transition:"background .1s"}}>
                        <span style={{color:isDH?C.accent:v>r.policyRate+1.5?C.green:v<r.policyRate-0.5?C.orange:C.text,
                          fontWeight:isDH?700:400}}>{v>0?v.toFixed(2):"—"}</span>
                      </td>
                    );
                  })}
                  <td style={{padding:"5px 6px",textAlign:"center"}}>
                    {spread!==null?(
                      <span style={{color:spread<0?C.red:spread<0.3?C.orange:C.green,fontWeight:700}}>
                        {spread>0?"+":""}{spread}%
                        {inv&&<span style={{display:"block",fontSize:6,color:C.red}}>⚠역전</span>}
                      </span>
                    ):"—"}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════
   CAPITAL FLOW HERO (시뮬레이션)
════════════════════════════════════════════ */
function CapitalFlowHero(){
  const [moIdx,setMoIdx]=useState(MONTHS.length-1);
  const [playing,setPlaying]=useState(false);
  const [playSpeed,setPlaySpeed]=useState(1.0);
  const [flowTab,setFlowTab]=useState("map");
  const [period,setPeriod]=useState("1M");
  const [hoveredEdge,setHoveredEdge]=useState(null);
  const [tick,setTick]=useState(0);
  const playRef=useRef(null);

  useEffect(()=>{
    if(playing){playRef.current=setInterval(()=>setMoIdx(m=>(m+1)%MONTHS.length),Math.round(1000/playSpeed));}
    return()=>clearInterval(playRef.current);
  },[playing,playSpeed]);

  useEffect(()=>{const iv=setInterval(()=>setTick(t=>t+1),60);return()=>clearInterval(iv);},[]);

  const periodMult={"1D":1/30,"1W":1/4,"2W":1/2,"1M":1,"3M":3,"6M":6,"1Y":12,"2Y":24};
  const mult=periodMult[period]||1;

  const edges=useMemo(()=>EDGES_DATA.map(e=>({...e,amount:Math.round(e.amounts[moIdx]*mult),w:e.amounts[moIdx]/480})),[moIdx,mult]);
  const maxAmt=useMemo(()=>Math.max(...edges.map(e=>e.amount)),[edges]);
  const totalFlow=useMemo(()=>edges.reduce((s,e)=>s+e.amount,0),[edges]);
  const curMo=MONTHS[moIdx];

  const particles=useRef([]);
  useEffect(()=>{
    particles.current=edges.flatMap(e=>{
      const cfg=TIER_CFG[e.tier];
      const cnt=Math.max(2,Math.round(cfg.count*(0.5+e.w)));
      return Array.from({length:cnt},(_,i)=>({
        id:`${e.from}${e.to}${i}${moIdx}`,from:e.from,to:e.to,
        speed:(0.05+Math.random()*0.09)*playSpeed*(0.5+e.w),
        color:NODES.find(n=>n.id===e.from)&&NODES.find(n=>n.id===e.from).color||"#fff",
        maxR:cfg.maxR*(0.55+e.w*0.6),opacity:0.5+e.w*0.45,
      }));
    });
  },[moIdx,playSpeed]);

  const periodLabel={"1D":"일간","1W":"주간","2W":"격주","1M":"월간","3M":"분기","6M":"반기","1Y":"연간","2Y":"2년"};
  const fmt=v=>period==="1D"?`$${Math.round(v*1000)}M`:`$${v}B`;

  return(
    <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden"}}>
      <div style={{padding:"10px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:3,height:20,background:C.accent,borderRadius:2}}/>
          <span style={{fontFamily:"Space Grotesk",fontSize:14,fontWeight:700,color:C.accent,letterSpacing:"0.08em"}}>CAPITAL FLOW MONITOR</span>
          <span style={{fontSize:9,color:C.gold,fontFamily:"JetBrains Mono"}}>글로벌 자금 이동 시각화 · 시뮬레이션</span>
        </div>
        <div style={{display:"flex",gap:5}}>
          {["map","chart","table"].map(t=>(
            <button key={t} className={`btn${flowTab===t?" active":""}`} onClick={()=>setFlowTab(t)}>
              {t==="map"?"🗺 MAP":t==="chart"?"📊 CHART":"📋 TABLE"}
            </button>
          ))}
        </div>
      </div>

      <div style={{padding:"10px 16px",background:C.panel2,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
        <button onClick={()=>setPlaying(p=>!p)} style={{
          width:34,height:34,borderRadius:"50%",border:`1px solid ${playing?C.accent:C.border}`,
          background:playing?C.accent+"22":"transparent",color:playing?C.accent:C.muted,
          fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          {playing?"⏸":"▶"}
        </button>
        <div style={{display:"flex",gap:4,flexShrink:0}}>
          {["1D","1W","2W","1M","3M","6M","1Y","2Y"].map(p=>(
            <button key={p} className={`btn${period===p?" gold-active":""}`}
              style={{padding:"3px 8px",fontSize:9}} onClick={()=>setPeriod(p)}>{p}</button>
          ))}
        </div>
        <div style={{flex:1,minWidth:200}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
            {MONTHS.filter((_,i)=>i%2===0).map((m,i)=>(
              <span key={i} onClick={()=>{setMoIdx(i*2);setPlaying(false);}}
                style={{fontSize:8,color:i*2===moIdx?C.accent:C.dim,fontFamily:"JetBrains Mono",cursor:"pointer",fontWeight:i*2===moIdx?700:400}}>
                {m.label.slice(2)}
              </span>
            ))}
          </div>
          <input type="range" min="0" max={MONTHS.length-1} value={moIdx}
            onChange={e=>{setMoIdx(+e.target.value);setPlaying(false);}} style={{accentColor:C.accent}}/>
        </div>
        <div style={{textAlign:"center",flexShrink:0}}>
          <div style={{fontFamily:"Space Grotesk",fontSize:15,fontWeight:700,color:C.accent}}>{curMo.label}</div>
          <div style={{fontSize:9,color:C.muted,fontFamily:"JetBrains Mono"}}>{periodLabel[period]} 총 이동</div>
          <div style={{fontSize:12,fontWeight:700,color:C.gold,fontFamily:"JetBrains Mono"}}>
            {period==="1D"?`$${(totalFlow*1000/30).toFixed(0)}M`:period==="1W"?`$${(totalFlow/4).toFixed(0)}B`:period==="2W"?`$${(totalFlow/2).toFixed(0)}B`:`$${(totalFlow/1000).toFixed(2)}T`}
          </div>
        </div>
        <div style={{flexShrink:0,minWidth:100}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
            <span style={{fontSize:8,color:C.muted,fontFamily:"JetBrains Mono"}}>재생 속도</span>
            <span style={{fontSize:9,color:C.gold,fontFamily:"JetBrains Mono",fontWeight:700}}>{playSpeed.toFixed(1)}×</span>
          </div>
          <input type="range" className="gold" min="0.3" max="5" step="0.1" value={playSpeed}
            onChange={e=>setPlaySpeed(+e.target.value)} style={{accentColor:C.gold}}/>
        </div>
      </div>

      {flowTab==="map"&&(
        <div style={{display:"flex",height:520}}>
          <div style={{flex:1,position:"relative",overflow:"hidden"}}>
            <svg width="100%" height="100%" style={{display:"block"}} viewBox="0 0 1000 520" preserveAspectRatio="xMidYMid meet">
              <defs>
                <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                <filter id="glow-xl"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                <radialGradient id="bggrad" cx="50%" cy="50%" r="70%">
                  <stop offset="0%" stopColor="#0a1628" stopOpacity="1"/>
                  <stop offset="100%" stopColor="#060810" stopOpacity="1"/>
                </radialGradient>
                <filter id="mapshadow"><feGaussianBlur stdDeviation="2" in="SourceAlpha" result="b"/><feOffset dx="1" dy="1"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
              </defs>
              <rect width="1000" height="520" fill="url(#bggrad)"/>
              {[100,200,300,400,500,600,700,800,900].map(v=>(
                <line key={`h${v}`} x1={v} y1="0" x2={v} y2="520" stroke="#0d1f35" strokeWidth="0.5"/>
              ))}
              {[100,200,300,400,500].map(v=>(
                <line key={`v${v}`} x1="0" y1={v} x2="1000" y2={v} stroke="#0d1f35" strokeWidth="0.5"/>
              ))}
              {WORLD_PATHS.map((p,i)=>(
                <path key={i} d={p.d} fill={p.color} stroke="#243555" strokeWidth="0.8" opacity="0.85" filter="url(#mapshadow)"/>
              ))}
              <line x1="0" y1="260" x2="1000" y2="260" stroke="#1a3050" strokeWidth="0.8" strokeDasharray="6 6" opacity="0.5"/>
              <line x1="500" y1="0" x2="500" y2="520" stroke="#1a3050" strokeWidth="0.5" strokeDasharray="4 8" opacity="0.35"/>
              {edges.map(e=>{
                const f=NODES.find(n=>n.id===e.from),t=NODES.find(n=>n.id===e.to);
                if(!f||!t)return null;
                const cfg=TIER_CFG[e.tier],tc=TIER_COLORS[e.tier];
                const x1=f.x*1000,y1=f.y*520,x2=t.x*1000,y2=t.y*520;
                const mx=(x1+x2)/2+(y2-y1)*0.18,my=(y1+y2)/2-(x2-x1)*0.18;
                const d=`M${x1},${y1} Q${mx},${my} ${x2},${y2}`;
                const isH=hoveredEdge===`${e.from}-${e.to}`;
                const sw=cfg.strokeW*(0.5+e.w*1.2)*(isH?2:1);
                return(
                  <g key={`${e.from}-${e.to}`}
                    onMouseEnter={()=>setHoveredEdge(`${e.from}-${e.to}`)}
                    onMouseLeave={()=>setHoveredEdge(null)} style={{cursor:"pointer"}}>
                    {(e.tier==="xl"||isH)&&<path d={d} stroke={tc} strokeWidth={sw*3.5} strokeOpacity={0.07} fill="none" filter="url(#glow-xl)"/>}
                    <path d={d} stroke={isH?tc:f.color} strokeWidth={sw}
                      strokeOpacity={isH?0.95:0.28+e.w*0.42} fill="none"
                      strokeDasharray={e.tier==="xl"?"none":e.tier==="lg"?"12 4":"7 6"}/>
                    <text x={mx} y={my} textAnchor="middle" dy="-8" fill={tc}
                      fontSize={isH?cfg.labelSz+2:cfg.labelSz} fontWeight="700"
                      fontFamily="JetBrains Mono,monospace" opacity={isH?1:0.85}
                      filter={e.tier==="xl"||isH?"url(#glow)":"none"}>
                      {period==="1D"?`$${Math.round(e.amount*1000/30)}M`:fmt(e.amount)}
                    </text>
                    {isH&&<text x={mx} y={my} textAnchor="middle" dy="6" fill="#fff" fontSize="9" fontFamily="JetBrains Mono,monospace" opacity="0.75">{e.label}</text>}
                  </g>
                );
              })}
              {particles.current.map(p=>{
                const f=NODES.find(n=>n.id===p.from),t=NODES.find(n=>n.id===p.to);
                if(!f||!t)return null;
                return <Particle key={p.id} from={{x:f.x,y:f.y}} to={{x:t.x,y:t.y}} speed={p.speed} color={p.color} maxR={p.maxR} opacity={p.opacity}/>;
              })}
              {NODES.map(nd=>{
                const px=nd.x*1000,py=nd.y*520;
                const pulse=Math.sin(tick*0.06+nd.x*8)*0.1+0.9;
                const inF=edges.filter(e=>e.to===nd.id).reduce((s,e)=>s+e.amount,0);
                const outF=edges.filter(e=>e.from===nd.id).reduce((s,e)=>s+e.amount,0);
                const net=inF-outF,nc=net>30?C.green:net<-30?C.red:nd.color;
                return(
                  <g key={nd.id}>
                    <circle cx={px} cy={py} r={nd.r*pulse*1.1} fill={nd.color} opacity="0.04"/>
                    <circle cx={px} cy={py} r={nd.r*0.68} fill={nd.color} opacity="0.08" filter="url(#glow)"/>
                    <circle cx={px} cy={py} r={nd.r*0.44} fill="#080d18" stroke={nd.color} strokeWidth="2" strokeOpacity="0.82"/>
                    <circle cx={px} cy={py} r={nd.r*0.52} fill="none" stroke={nc} strokeWidth="2.5" strokeOpacity="0.38" strokeDasharray={`${Math.abs(net)/8} 4`}/>
                    <text x={px} y={py} textAnchor="middle" dy="-5" fill={nd.color} fontSize="11" fontWeight="700" fontFamily="JetBrains Mono,monospace">{nd.label}</text>
                    <text x={px} y={py} textAnchor="middle" dy="7" fill={nd.color} fontSize="8" opacity="0.55" fontFamily="JetBrains Mono,monospace">{nd.en}</text>
                    <text x={px} y={py} textAnchor="middle" dy="18" fill={nc} fontSize="9" fontWeight="700" fontFamily="JetBrains Mono,monospace" opacity="0.9">
                      {net>0?`+${net}B`:net<0?`${net}B`:""}
                    </text>
                  </g>
                );
              })}
              <rect x="8" y="8" width="125" height="92" rx="5" fill="#06090f" opacity="0.9"/>
              <text x="16" y="22" fill={C.muted} fontSize="9" fontFamily="JetBrains Mono,monospace" fontWeight="700">자금 규모</text>
              {Object.entries(TIER_CFG).map(([tier,cfg],i)=>{
                const tc=TIER_COLORS[tier];
                const ranges={xl:">$300B",lg:"$150-300B",md:"$80-150B",sm:"<$80B"};
                return(
                  <g key={tier} transform={`translate(12,${30+i*17})`}>
                    <circle r={cfg.maxR*0.7} cx="7" cy="4" fill={tc} opacity="0.9"/>
                    <line x1="16" y1="4" x2="34" y2="4" stroke={tc} strokeWidth={cfg.strokeW*0.8} opacity="0.75"/>
                    <text x="38" y="8" fill={tc} fontSize="9" fontFamily="JetBrains Mono,monospace">{ranges[tier]}</text>
                  </g>
                );
              })}
              <rect x="840" y="8" width="152" height="28" rx="4" fill="#06090f" opacity="0.9"/>
              <text x="916" y="26" textAnchor="middle" fill={C.gold} fontSize="11" fontWeight="700" fontFamily="JetBrains Mono,monospace">{curMo.label} · {periodLabel[period]}</text>
            </svg>
          </div>
          <div style={{width:215,borderLeft:`1px solid ${C.border}`,overflowY:"auto",background:C.panel2,padding:"10px 8px"}}>
            <div style={{fontSize:10,color:C.muted,fontFamily:"JetBrains Mono",fontWeight:700,letterSpacing:"0.1em",marginBottom:8}}>
              TOP FLOWS · {curMo.label}
            </div>
            {[...edges].sort((a,b)=>b.amount-a.amount).map((e,i)=>{
              const f=NODES.find(n=>n.id===e.from),t=NODES.find(n=>n.id===e.to);
              const tc=TIER_COLORS[e.tier];
              const prevAmt=e.amounts[(moIdx+MONTHS.length-1)%MONTHS.length];
              const delta=e.amounts[moIdx]-prevAmt;
              return(
                <div key={`${e.from}-${e.to}`} style={{marginBottom:7,padding:"7px 8px",background:C.panel,borderRadius:5,border:`1px solid ${tc}33`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                    <span style={{fontSize:9,color:f&&f.color,fontFamily:"JetBrains Mono",fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:130}}>
                      {i+1}. {f&&f.label}→{t&&t.label}
                    </span>
                    <span style={{fontSize:8,color:tc,fontWeight:700}}>{TIER_CFG[e.tier].badge}</span>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                    <span style={{fontSize:13,fontWeight:700,color:tc,fontFamily:"JetBrains Mono"}}>{fmt(e.amount)}</span>
                    <span style={{fontSize:9,color:delta>=0?C.green:C.red,fontFamily:"JetBrains Mono"}}>
                      {delta>=0?"▲":"▼"}${Math.abs(delta)}B
                    </span>
                  </div>
                  <div style={{height:3,background:C.border,borderRadius:2,marginBottom:4}}>
                    <div style={{width:`${(e.amount/maxAmt)*100}%`,height:"100%",background:`linear-gradient(90deg,${f&&f.color}88,${tc})`,borderRadius:2}}/>
                  </div>
                  <Spark data={e.amounts} width={195} height={22}/>
                  <div style={{fontSize:8,color:C.dim,fontFamily:"JetBrains Mono",marginTop:2}}>{e.label}</div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {flowTab==="chart"&&(
        <div style={{height:520,overflowY:"auto",padding:14}}>
          <div style={{fontSize:11,color:C.muted,fontFamily:"JetBrains Mono",marginBottom:10,fontWeight:700}}>
            24개월 추이 — 클릭하면 해당 월로 이동 (단위: $B)
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {[...edges].sort((a,b)=>b.amount-a.amount).map(e=>{
              const f=NODES.find(n=>n.id===e.from),t=NODES.find(n=>n.id===e.to);
              const tc=TIER_COLORS[e.tier];
              const maxV=Math.max(...e.amounts);
              return(
                <div key={`${e.from}-${e.to}`} style={{background:C.panel2,borderRadius:6,padding:"10px 12px",border:`1px solid ${tc}33`}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                    <span style={{fontSize:10,color:f&&f.color,fontFamily:"JetBrains Mono",fontWeight:700}}>{f&&f.label} → {t&&t.label}</span>
                    <span style={{fontSize:9,color:C.muted}}>{e.label}</span>
                  </div>
                  <div style={{display:"flex",alignItems:"flex-end",gap:2,height:44}}>
                    {e.amounts.map((v,i)=>{
                      const bh=(v/maxV)*40,isCur=i===moIdx;
                      return(
                        <div key={i} title={`${MONTHS[i].label}: $${v}B`}
                          style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",cursor:"pointer"}}
                          onClick={()=>{setMoIdx(i);setFlowTab("map");}}>
                          <div style={{width:"100%",height:bh,background:isCur?tc:tc+"44",borderRadius:"2px 2px 0 0",transition:"height .3s",boxShadow:isCur?`0 0 8px ${tc}88`:"none"}}/>
                        </div>
                      );
                    })}
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",marginTop:2}}>
                    {MONTHS.filter((_,i)=>i%4===0).map((m,i)=>(
                      <span key={i} style={{fontSize:7,color:C.dim,fontFamily:"JetBrains Mono"}}>{m.label.slice(2)}</span>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {flowTab==="table"&&(
        <div style={{height:520,overflowX:"auto",overflowY:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontFamily:"JetBrains Mono",fontSize:9,minWidth:900}}>
            <thead>
              <tr style={{background:C.panel2,position:"sticky",top:0,zIndex:1}}>
                <th style={{padding:"8px 12px",textAlign:"left",color:C.muted,fontSize:9,fontWeight:700,borderBottom:`1px solid ${C.border}`,minWidth:160}}>경로</th>
                {MONTHS.map((m,i)=>(
                  <th key={i} onClick={()=>setMoIdx(i)}
                    style={{padding:"6px 4px",textAlign:"right",color:i===moIdx?C.accent:C.muted,fontSize:8,fontWeight:i===moIdx?700:400,borderBottom:`1px solid ${C.border}`,cursor:"pointer",minWidth:40,background:i===moIdx?C.accent+"11":"transparent"}}>
                    {m.label.slice(2)}
                  </th>
                ))}
                <th style={{padding:"8px 8px",textAlign:"right",color:C.gold,fontSize:9,fontWeight:700,borderBottom:`1px solid ${C.border}`}}>평균</th>
              </tr>
            </thead>
            <tbody>
              {[...EDGES_DATA].sort((a,b)=>b.amounts[moIdx]-a.amounts[moIdx]).map((e,idx)=>{
                const f=NODES.find(n=>n.id===e.from),t=NODES.find(n=>n.id===e.to);
                const tc=TIER_COLORS[e.tier];
                const avg=Math.round(e.amounts.reduce((s,v)=>s+v,0)/24);
                return(
                  <tr key={`${e.from}-${e.to}`} style={{borderBottom:`1px solid ${C.border}22`,background:idx%2===0?C.panel:C.bg}}>
                    <td style={{padding:"6px 12px"}}>
                      <span style={{color:f&&f.color,fontWeight:700}}>{f&&f.label}</span>
                      <span style={{color:C.muted}}> → </span>
                      <span style={{color:(t&&t.color)||C.text}}>{t&&t.label}</span>
                    </td>
                    {e.amounts.map((v,i)=>{
                      const isCur=i===moIdx,isHi=v===Math.max(...e.amounts),isLo=v===Math.min(...e.amounts);
                      return(
                        <td key={i} onClick={()=>setMoIdx(i)}
                          style={{padding:"6px 4px",textAlign:"right",cursor:"pointer",
                            color:isCur?C.accent:isHi?C.green:isLo?C.red:C.text,
                            background:isCur?`${C.accent}11`:"transparent",fontWeight:isCur||isHi?700:400}}>
                          {v}
                        </td>
                      );
                    })}
                    <td style={{padding:"6px 8px",textAlign:"right",color:C.gold,fontWeight:700}}>{avg}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

                <span style={{color:corrColor(hover.v),fontWeight:700}}>{hover.v>0?"+":""}{hover.v.toFixed(2)}</span>
                <span style={{color:C.muted,fontSize:8}}> ({hover.v>0.7?"강한 양(+)":hover.v>0.3?"중간 양(+)":hover.v>-0.3?"거의 무관":hover.v>-0.7?"중간 음(-)":"강한 음(-)"})</span>
              </span>

        </div>
        <div style={{display:"flex"}}>
          <div style={{display:"flex",flexDirection:"column",marginRight:4,marginTop:sz+gap+2}}>
            {CORR_ASSETS.map((a,i)=>(
              <div key={i} style={{height:sz+gap,display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:6}}>
                <span style={{fontSize:9,color:C.muted,fontFamily:"JetBrains Mono",whiteSpace:"nowrap"}}>{a}</span>

          </div>
          <div>
            <div style={{display:"flex",marginBottom:4}}>
              {CORR_ASSETS.map((a,i)=>(
                <div key={i} style={{width:sz+gap,overflow:"hidden",display:"flex",alignItems:"flex-end",justifyContent:"center",paddingBottom:4}}>
                  <span style={{fontSize:8,color:C.muted,fontFamily:"JetBrains Mono",writingMode:"vertical-rl",transform:"rotate(180deg)",whiteSpace:"nowrap"}}>{a}</span>

/* ════════════════════════════════════════════
   ARBITRAGE PANEL
════════════════════════════════════════════ */
function ArbitragePanel(){
  const typeColors={crypto:C.red,commodity:C.gold,rate:C.accent,equity:C.green,fx:C.purple,volatility:"#bb86fc"};
  const typeLabels={crypto:"암호화폐",commodity:"원자재",rate:"금리",equity:"주식",fx:"외환",volatility:"변동성"};
  const [filter,setFilter]=useState("all");
  const [live,setLive]=useState(window.__live||{});

  useEffect(()=>{
    const iv=setInterval(()=>{if(window.__live)setLive(Object.assign({},window.__live));},2000);
    return()=>clearInterval(iv);
  },[]);

  // FRED 실데이터 반영: 미-한 금리차, 미-일 금리차
  const liveArb=ARB_DATA.map(a=>{
    const fred=live.fred||{};
    if(a.name==="미-한 금리차"&&fred.rate10y&&live.fredLive){
      return Object.assign({},a,{value:+(fred.rate10y-3.02).toFixed(2),
        desc:`US 10Y(${fred.rate10y}%) - KR 10Y(3.02%)`,live:true});
    }
    if(a.name==="미-일 금리차"&&fred.rate10y&&live.fredLive){
      return Object.assign({},a,{value:+(fred.rate10y-0.72).toFixed(2),
        desc:`US 10Y(${fred.rate10y}%) - JP 10Y(0.72%)`,live:true});
    }
    if(a.name==="미-유 금리차"&&fred.rate10y&&live.fredLive){
      return Object.assign({},a,{value:+(fred.rate10y-2.65).toFixed(2),
        desc:`US 10Y(${fred.rate10y}%) - EU 10Y(2.65%)`,live:true});
    }
    return a;
  });

  const filtered=filter==="all"?liveArb:liveArb.filter(a=>a.type===filter);
  return(
    <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:6,overflow:"hidden"}}>
      <div style={{padding:"8px 14px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:3,height:18,background:C.gold,borderRadius:2}}/>
          <span style={{fontFamily:"Space Grotesk",fontSize:11,fontWeight:700,color:C.gold,letterSpacing:"0.1em",textTransform:"uppercase"}}>아비트라지 기회</span>
          <span style={{fontSize:9,color:C.muted,fontFamily:"JetBrains Mono"}}>Cross-Market Arbitrage</span>
          {live.fredLive&&<span style={{fontSize:7.5,color:C.green,fontFamily:"JetBrains Mono"}}>● FRED 금리 반영</span>}
        </div>
        <div style={{display:"flex",gap:4}}>
          {["all","rate","crypto","commodity","equity","fx"].map(t=>(
            <button key={t} className={`btn${filter===t?" active":""}`} style={{padding:"2px 8px",fontSize:8}} onClick={()=>setFilter(t)}>
              {t==="all"?"전체":typeLabels[t]||t}
            </button>
          ))}
        </div>
      </div>
      <div style={{padding:"10px 12px",display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:8}}>
        {filtered.map(a=>{
          const tc=typeColors[a.type]||C.accent;
          const ratio=a.dir==="up"?a.value/a.threshold:a.threshold/a.value;
          const opportunity=ratio>0.9,pct=Math.min(ratio*100,100);
          return(
            <div key={a.name} style={{padding:"10px 12px",background:C.bg,borderRadius:6,
              border:`1px solid ${opportunity?tc+"66":C.border}`,
              boxShadow:opportunity?`0 0 12px ${tc}22`:"none"}}>

   FX PANEL
════════════════════════════════════════════ */
function FXPanel(){
  const [rates,setRates]=useState({KRW:1368.5,JPY:149.2,EUR:0.918,GBP:0.782,CNY:7.24,MXN:17.85,AUD:1.562,CAD:1.382});
  const [live,setLive]=useState(false);
  const r=useRef(null);
  function genHist(base,vol,n=24){
    if(!r.current)r.current=seededR(Math.round(base*100));
    return Array.from({length:n},()=>+(base*(1+(r.current()-0.5)*vol*2)).toFixed(base>10?1:4));
  }
  const [hist,setHist]=useState({});
  useEffect(()=>{
    const go=async()=>{
      try{
        const res=await fetch("https://api.exchangerate-api.com/v4/latest/USD");
        if(!res.ok)return;
        const d=await res.json();
        setRates({KRW:d.rates.KRW,JPY:d.rates.JPY,EUR:d.rates.EUR,GBP:d.rates.GBP,CNY:d.rates.CNY,MXN:d.rates.MXN,AUD:d.rates.AUD,CAD:d.rates.CAD});
        setLive(true);
      }catch{}
    };
    go();const iv=setInterval(go,60000);return()=>clearInterval(iv);
  },[]);
  useEffect(()=>{
    if(rates.KRW!==1368.5){
      setHist({
        "USD/KRW":genHist(rates.KRW,0.025),"USD/JPY":genHist(rates.JPY,0.02),
        "EUR/USD":genHist(1/rates.EUR,0.018),"GBP/USD":genHist(1/rates.GBP,0.022),
        "USD/CNY":genHist(rates.CNY,0.015),"USD/MXN":genHist(rates.MXN,0.035),
        "AUD/USD":genHist(1/rates.AUD,0.022),"USD/CAD":genHist(rates.CAD,0.018),
      });
    }
  },[rates]);
  const pairs=[
    {p:"USD/KRW",v:rates.KRW,f:"🇺🇸🇰🇷",dec:1},{p:"USD/JPY",v:rates.JPY,f:"🇺🇸🇯🇵",dec:2},
    {p:"EUR/USD",v:1/rates.EUR,f:"🇪🇺🇺🇸",dec:4},{p:"GBP/USD",v:1/rates.GBP,f:"🇬🇧🇺🇸",dec:4},
    {p:"USD/CNY",v:rates.CNY,f:"🇺🇸🇨🇳",dec:4},{p:"USD/MXN",v:rates.MXN,f:"🇺🇸🇲🇽",dec:4},
    {p:"AUD/USD",v:1/rates.AUD,f:"🇦🇺🇺🇸",dec:4},{p:"USD/CAD",v:rates.CAD,f:"🇺🇸🇨🇦",dec:4},
  ];
  return(
    <div style={{padding:"8px 10px",display:"flex",flexDirection:"column",gap:5}}>
      {pairs.map(x=>{
        const sp=hist[x.p];const last=sp?sp[sp.length-1]:null,first=sp?sp[0]:null;
        const chg=last&&first?((last-first)/first*100):0;
        return(
          <div key={x.p} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 8px",background:C.bg,borderRadius:4,border:`1px solid ${C.border}`}}>
            <span style={{fontSize:11}}>{x.f}</span>
            <span style={{color:C.accent,fontFamily:"JetBrains Mono",fontSize:10,fontWeight:700,minWidth:72}}>{x.p}</span>
            <span style={{color:C.text,fontFamily:"JetBrains Mono",fontSize:11,fontWeight:700,minWidth:68}}>{parseFloat(x.v).toFixed(x.dec)}</span>
            {sp&&<Spark data={sp} width={72} height={24}/>}
            {sp&&<span style={{fontSize:9,color:chg>=0?C.green:C.red,fontFamily:"JetBrains Mono",minWidth:44,textAlign:"right"}}>{chg>=0?"▲":"▼"}{Math.abs(chg).toFixed(2)}%</span>}
          </div>
        );
      })}
      <div style={{fontSize:9,color:live?C.green:C.muted,textAlign:"right",fontFamily:"JetBrains Mono"}}>{live?"● LIVE · ExchangeRate-API":"○ 연결 중..."}</div>
    </div>
  );
}

          <Box title="암호화폐 실시간 · Crypto" badge={<span style={{fontSize:9,color:C.green}}>● CoinGecko LIVE</span>}>
            <CryptoLive/>
          </Box>
          <Box title="원자재 · Commodities" badge={<span style={{fontSize:9,color:C.gold}}>참고가</span>}>
            <div style={{padding:"8px 10px",display:"flex",flexDirection:"column",gap:5}}>
              {[
                {s:"🥇 XAU/Gold",  p:3018.4,c:0.82, col:"#ffd700"},{s:"🥈 XAG/Silver",p:33.24,c:1.14, col:"#c0c0c0"},
                {s:"🛢️ WTI Oil",   p:68.45, c:-0.63,col:"#ff7043"},{s:"⛽ Brent",      p:72.18,c:-0.41,col:"#ff9800"},
                {s:"⚡ NatGas",    p:3.82,  c:2.15, col:"#4caf50"},{s:"🔩 Copper",     p:4.52, c:0.35, col:"#b87333"},
                {s:"⚫ Platinum",  p:944.0, c:-0.28,col:"#e0e0e0"},{s:"🌽 Corn",       p:4.65, c:-0.52,col:"#ffcc02"},
              ].map(x=>(
                <div key={x.s} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 8px",background:C.bg,borderRadius:4,border:`1px solid ${C.border}`}}>
                  <span style={{color:x.col,fontSize:9,fontWeight:700,minWidth:80,fontFamily:"JetBrains Mono"}}>{x.s}</span>
                  <span style={{color:C.text,fontSize:10,fontFamily:"JetBrains Mono"}}>${x.p.toFixed(x.p>100?1:2)}</span>
                  <span style={{color:x.c>=0?C.green:C.red,fontSize:9,fontFamily:"JetBrains Mono"}}>{x.c>=0?"▲":"▼"}{Math.abs(x.c).toFixed(2)}%</span>
                </div>
              ))}
            </div>
          </Box>
        </div>

        {/* ⑨ 경제 캘린더 */}
        <Box title="경제 캘린더 · Economic Calendar" badge={<span style={{fontSize:9,color:C.green}}>● TRADINGVIEW LIVE</span>}>
          <TV type="events" height={240} opts={{importanceFilter:"0,1",countryFilter:"us,eu,jp,kr,cn,gb,au,ca,in"}}/>
        </Box>

      </div>

      {/* 푸터 */}
      <div style={{padding:"6px 16px",borderTop:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",fontSize:8,color:C.dim}}>
        <span>증시/환율/캘린더: TradingView · 금리/거시: FRED API · 한국금리: ECOS(한국은행) · 외국인투자: FSS(금융감독원) · IMF: GDP/BOP · 암호화폐: CoinGecko · 환율: ExchangeRate-API · 자금흐름/상관관계/아비트라지: 시뮬레이션+추정</span>
        <span style={{color:C.muted,whiteSpace:"nowrap",marginLeft:10}}>MACRO TERMINAL v5.0 · © 2025</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
