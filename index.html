function fredFetch(series) {
  return fetch('https://fred.stlouisfed.org/graph/fredgraph.csv?id='+series)
    .then(function(r){ return r.text(); })
    .then(function(t){
      var lines=t.trim().split('\n');
      for(var i=lines.length-1;i>=1;i--){
        var p=lines[i].split(',');
        if(p[1]&&p[1].trim()!=='.'&&!isNaN(parseFloat(p[1])))return parseFloat(p[1]);
      }
      return null;
    }).catch(function(){return null;});
}

    fredFetch('DGS1MO'),fredFetch('DGS3MO'),fredFetch('DGS6MO'),fredFetch('DGS1'),fredFetch('DGS5'),
  ]).then(function(v){

function ecosFetch(statCode,cycle,startDate,endDate,itemCode1){
  if(!ECOS_KEY)return Promise.resolve(null);

    +'/json/kr/1/100/'+statCode+'/'+cycle+'/'+startDate+'/'+endDate
    +(itemCode1?'/'+itemCode1:'');
  return fetch(url,{method:'GET',headers:{Accept:'application/json'}})
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(d){
      if(d.RESULT){console.warn('[ECOS]',d.RESULT.CODE,d.RESULT.MESSAGE);return null;}
      if(!d.StatisticSearch)return null;
      return d.StatisticSearch.row||[];
    }).catch(function(e){console.warn('[ECOS]'+statCode+':',e.message);return null;});
}

/* ── Alpha Vantage 원자재 ── */
function avFetch(func,symbol,field){
  var url='https://www.alphavantage.co/query?function='+func+'&symbol='+symbol+'&interval=daily&outputsize=compact&apikey='+AV_KEY;
  return fetch(url)
    .then(function(r){return r.json();})
    .then(function(d){
      var key=field||'Time Series (Daily)';
      var ts=d[key]||d['Global Quote'];
      if(!ts)return null;
      if(d['Global Quote']){
        return{price:parseFloat(d['Global Quote']['05. price']||0),chg:parseFloat(d['Global Quote']['10. change percent']||0)};
      }
      var dates=Object.keys(ts).sort().reverse();
      if(dates.length<2)return null;
      var cur=parseFloat(ts[dates[0]]['4. close']||ts[dates[0]]['4b. close (USD)']||0);
      var prev=parseFloat(ts[dates[1]]['4. close']||ts[dates[1]]['4b. close (USD)']||0);
      return{price:cur,chg:prev?((cur-prev)/prev*100):0};
    }).catch(function(e){console.warn('[AV] '+symbol+':',e.message);return null;});
}

function loadAv(){
  if(!AV_KEY)return;

    fetch('https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=XAUUSD&apikey='+AV_KEY).then(function(r){return r.json();}).catch(function(){return null;}),
  ]).then(function(v){
    var lv=window.__live.av;
    function gq(d,fallback){
      if(!d)return fallback;
      var gq=d['Global Quote'];if(gq&&gq['05. price']){return{price:parseFloat(gq['05. price']),chg:parseFloat(gq['10. change percent']||0)};}
      return fallback;
    }
    function series(d){
      if(!d||!d.data)return null;
      var rows=d.data.filter(function(r){return r.value&&r.value!='.'});
      if(rows.length<2)return null;
      var cur=parseFloat(rows[0].value),prev=parseFloat(rows[1].value);
      return{price:cur,chg:prev?((cur-prev)/prev*100):0};
    }
    var gold=gq(v[6],null)||gq(v[0],null);
    var silver=gq(v[1],null);

    var ng=series(v[4]);

  }).catch(function(e){console.warn('[AV] 전체:',e);});
}

function parseFssData(d){
  var items=[];
  /* FSS 응답 구조 여러 경로 시도 */
  if(d&&d.invtTrend&&d.invtTrend.item)       items=d.invtTrend.item;
  else if(d&&d.list)                           items=d.list;
  else if(Array.isArray(d))                    items=d;
  else if(d&&d.result&&d.result.list)          items=d.result.list;
  if(!Array.isArray(items)) items=items?[items]:[];
  if(items.length===0)return null;
  var monthly={};
  items.forEach(function(row){
    if(!row)return;
    var dd=row.trdDd||row.baseDt||row.date||'';
    if(!dd||dd.length<6)return;
    var ym=String(dd).slice(0,6);
    if(!monthly[ym])monthly[ym]={s:0,b:0};
    var sv=parseFloat(row.stckNetBuyAmt||row.netBuyAmt||row.stockAmt||0);
    var bv=parseFloat(row.bondNetBuyAmt||row.bondAmt||0);
    monthly[ym].s+=isNaN(sv)?0:sv;
    monthly[ym].b+=isNaN(bv)?0:bv;
  });
  var arr=Object.keys(monthly).sort().map(function(ym){
    var m=monthly[ym];
    return{
      date:ym,
      stockNet:+(m.s/100000000).toFixed(1),
      bondNet: +(m.b/100000000).toFixed(1),
      totalNet:+((m.s+m.b)/100000000).toFixed(1)
    };
  }).filter(function(r){return r.stockNet!==0||r.bondNet!==0;});
  return arr.length>0?arr:null;
}

function loadFss(){
  if(!FSS_KEY)return;
  var now=new Date();
  var end=now.toISOString().slice(0,10).replace(/-/g,'');
  var start=new Date(now.getFullYear(),now.getMonth()-6,1).toISOString().slice(0,10).replace(/-/g,'');
  var directUrl='https://www.fss.or.kr/fss/kr/openApi/api/invtTrend.jsp'
    +'?apiType=json&startDate='+start+'&endDate='+end+'&authKey='+FSS_KEY;

  /* 프록시 우선순위 목록 — 순서대로 시도 */
  var PROXIES=[
    function(u){return 'https://corsproxy.io/?'+encodeURIComponent(u);},
    function(u){return 'https://api.allorigins.win/raw?url='+encodeURIComponent(u);},
    function(u){return 'https://api.codetabs.com/v1/proxy?quest='+encodeURIComponent(u);},
    function(u){return u;},  /* 마지막: 직접 시도 (일부 환경 허용) */
  ];

  function tryProxy(idx){
    if(idx>=PROXIES.length){
      console.warn('[FSS] 모든 프록시 실패 — 임시 샘플 데이터 표시');
      /* 실데이터 연결 실패 시 샘플 폴백 (시각화 유지용) */
      window.__live.fss.corsBlocked=true;
      window.__live.fssLive=false;
      return;
    }
    var url=PROXIES[idx](directUrl);
    console.log('[FSS] 시도 #'+(idx+1)+': '+url.slice(0,70)+'...');
    fetch(url,{headers:{'Accept':'application/json, text/plain, */*'}})
      .then(function(r){
        if(!r.ok)throw new Error('HTTP '+r.status);
        return r.text();
      })
      .then(function(txt){
        /* allorigins는 감싸진 JSON 형태일 수 있음 */
        var raw=txt;
        try{
          var wrap=JSON.parse(txt);
          if(wrap&&wrap.contents)raw=wrap.contents;
        }catch(_){}
        var d;
        try{d=JSON.parse(raw);}
        catch(e){throw new Error('JSON 파싱 실패');}
        var arr=parseFssData(d);
        if(!arr)throw new Error('데이터 없음');
        window.__live.fss.foreignStock=arr;
        window.__live.fss.corsBlocked=false;
        window.__live.fssLive=true;
        window.__live.lastUpdated=new Date();
        console.log('[FSS] ✅ 프록시 #'+(idx+1)+' 성공 — '+arr.length+'개월 데이터');
      })
      .catch(function(e){
        console.warn('[FSS] 프록시 #'+(idx+1)+' 실패:',e.message);
        tryProxy(idx+1);  /* 다음 프록시 시도 */
      });
  }

  tryProxy(0);
}

/* FSS 재시도 — 초기 로딩 후 30초 간격으로 최대 3회 */
var _fssRetry=0;
function scheduleFssRetry(){
  if(_fssRetry>=3||window.__live.fssLive)return;
  _fssRetry++;
  setTimeout(function(){
    if(!window.__live.fssLive){
      console.log('[FSS] 재시도 '+_fssRetry+'/3...');
      loadFss();
      scheduleFssRetry();
    }
  },30000*_fssRetry);
}

function loadImf(){
  var CTRY='USA,KOR,JPN,CHN,DEU,GBR,AUS,CAN,IND';
  var MAP={USA:'us',KOR:'kr',JPN:'jp',CHN:'cn',DEU:'eu',GBR:'gb',AUS:'au',CAN:'ca',IND:'in'};
  ['NGDP_RPCH','BCA_NGDPD'].forEach(function(s){
    fetch('https://www.imf.org/external/datamapper/api/v1/'+s+'?periods=2024&countries='+CTRY)
      .then(function(r){return r.json();})
      .then(function(d){
        if(!d.values||!d.values[s])return;
        var vals=d.values[s],key=s==='NGDP_RPCH'?'gdp':'bop';
        Object.keys(MAP).forEach(function(c){
          if(vals[c]&&vals[c]['2024'])window.__live.imf[key][MAP[c]]=parseFloat(vals[c]['2024']);
        });
        window.__live.imfLive=true;
        console.log('[IMF]',s,'loaded');
      }).catch(function(e){console.warn('[IMF]',s,e.message);});
  });
}

loadFred(); loadEcos(); loadFss(); loadImf(); loadAv();
setInterval(loadFred,300000); setInterval(loadEcos,600000); setInterval(loadAv,900000);
scheduleFssRetry();
</script>

function seededR(seed){let s=seed%2147483647;if(s<=0)s+=2147483646;return()=>{s=s*16807%2147483647;return(s-1)/2147483646;};}
function corrColor(v){
  if(v>0.7)return"#00e676";if(v>0.4)return"#4caf50";if(v>0.1)return"#8bc34a";
  if(v>-0.1)return"#5a6a7a";if(v>-0.4)return"#ff7043";if(v>-0.7)return"#f44336";
  return"#ff1744";
}
function fmtNum(v,dec){if(v==null)return"—";const n=parseFloat(v);return isNaN(n)?"—":n.toFixed(dec==null?2:dec);}

function TV({type,opts,height}){
  const ref=useRef(null);
  const uid=useRef("tv_"+Math.random().toString(36).slice(2));
  useEffect(()=>{
    if(!ref.current)return;
    ref.current.innerHTML="";
    const w=document.createElement("div");w.id=uid.current;ref.current.appendChild(w);
    const s=document.createElement("script");
    s.src=`https://s3.tradingview.com/external-embedding/embed-widget-${type}.js`;
    s.async=true;
    s.innerHTML=JSON.stringify({...opts,container_id:uid.current,width:"100%",height,colorTheme:"dark",locale:"kr",isTransparent:true});
    w.appendChild(s);
    return()=>{if(ref.current)ref.current.innerHTML="";};
  },[]);
  return <div ref={ref} style={{width:"100%",height,overflow:"hidden"}}/>;
}

function Spark({data,width=80,height=26}){
  if(!data||data.length<2)return null;
  const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*width},${height-((v-mn)/rng)*(height-4)-2}`).join(" ");
  const up=data[data.length-1]>=data[0];
  return(
    <svg width={width} height={height} style={{display:"block"}}>
      <polyline points={pts} fill="none" stroke={up?C.green:C.red} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
      <circle cx={(data.length-1)/(data.length-1)*width} cy={height-((data[data.length-1]-mn)/rng)*(height-4)-2} r="2.5" fill={up?C.green:C.red}/>
    </svg>
  );
}

function Box({title,badge,children,style}){
  return(
    <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:6,overflow:"hidden",...style}}>
      <div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:11,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:C.muted,padding:"8px 12px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span>{title}</span>{badge&&<span>{badge}</span>}
      </div>
      {children}
    </div>
  );
}

/* ════════════════════════════════════════════
   📈 YIELD CURVE PANEL (인터랙티브)
════════════════════════════════════════════ */
function YieldCurvePanel({regionsLive,live,fred}){
  const DURATIONS=["1M","3M","6M","1Y","2Y","5Y","10Y","30Y"];
  const [hovId,setHovId]=useState(null);
  const [hovDur,setHovDur]=useState(null);

  const CW=620,CH=240,PL=44,PR=14,PT=16,PB=32;
  const gW=CW-PL-PR,gH=CH-PT-PB;

  // US는 FRED 실데이터 우선
  const regions=regionsLive.map(function(r){
    if(r.id==="us"&&live.fredLive&&fred.yields&&fred.yields.some(function(v){return v>0;})){
      return Object.assign({},r,{yields:fred.yields});
    }
    return r;
  }).filter(function(r){return r.yields&&r.yields.filter(function(v){return v>0;}).length>2;});

  const allVals=[];
  regions.forEach(function(r){r.yields.forEach(function(v){if(v>0)allVals.push(v);});});
  const yMin=allVals.length?Math.floor((Math.min.apply(null,allVals)-0.3)*2)/2:0;
  const yMax=allVals.length?Math.ceil((Math.max.apply(null,allVals)+0.3)*2)/2:8;
  const yRange=yMax-yMin||1;

  function xOf(i){return PL+(i/(DURATIONS.length-1))*gW;}
  function yOf(v){return PT+(1-(v-yMin)/yRange)*gH;}

  function getPath(ylds){
    return ylds.map(function(v,i){return(i===0?"M":"L")+xOf(i).toFixed(1)+" "+yOf(v).toFixed(1);}).join(" ");
  }

  const yTicks=[];
  for(var y=Math.ceil(yMin*2)/2;y<=yMax;y=Math.round((y+0.5)*100)/100)yTicks.push(y);

  function handleMove(e){
    var rect=e.currentTarget.getBoundingClientRect();
    var mx=e.clientX-rect.left;
    var best=0,bestD=9999;
    DURATIONS.forEach(function(_,i){var d=Math.abs(mx-xOf(i));if(d<bestD){bestD=d;best=i;}});
    setHovDur(best);
  }

  return(
    <div>
      {/* 범례 */}
      <div style={{padding:"7px 12px",borderBottom:`1px solid ${C.border}`,display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
        <span style={{fontSize:7.5,color:C.dim,fontFamily:"JetBrains Mono",marginRight:4}}>수익률 곡선 ·</span>
        {regions.map(function(r){
          const isH=hovId===r.id,inv=r.yields[6]<r.yields[4];
          return(
            <div key={r.id} onMouseEnter={function(){setHovId(r.id);}} onMouseLeave={function(){setHovId(null);}}
              style={{display:"flex",alignItems:"center",gap:4,padding:"2px 7px",borderRadius:3,cursor:"pointer",
                background:isH?r.color+"1a":"transparent",border:`1px solid ${isH?r.color:r.color+"44"}`,transition:"all .12s"}}>
              <span style={{fontSize:11,lineHeight:1}}>{r.flag}</span>
              <span style={{fontSize:8,color:isH?r.color:C.muted,fontFamily:"JetBrains Mono",fontWeight:isH?700:400}}>{r.name}</span>
              <span style={{fontSize:8.5,color:r.color,fontFamily:"JetBrains Mono",fontWeight:700}}>{r.policyRate}%</span>
              {inv&&<span style={{fontSize:6.5,color:C.red}}>⚠</span>}
              {r.id==="us"&&live.fredLive&&<span style={{fontSize:6,color:C.green}}>●</span>}
              {r.id==="kr"&&live.ecosLive&&<span style={{fontSize:6,color:C.gold}}>●</span>}
            </div>
          );
        })}
      </div>

      {/* SVG */}
      <div style={{padding:"4px 12px 0"}}>
        <svg width={CW} height={CH} style={{display:"block",maxWidth:"100%"}}
          onMouseMove={handleMove} onMouseLeave={function(){setHovDur(null);}}>

          {yTicks.map(function(y,i){
            const yp=yOf(y);
            return(
              <g key={i}>
                <line x1={PL} y1={yp} x2={CW-PR} y2={yp} stroke={C.border} strokeWidth="0.5" strokeDasharray="3,3"/>
                <text x={PL-5} y={yp+3.5} textAnchor="end" fill={C.dim} fontSize="8" fontFamily="JetBrains Mono">{y.toFixed(1)}</text>
              </g>
            );
          })}

          {DURATIONS.map(function(d,i){
            const xp=xOf(i),isH=hovDur===i;
            return(
              <g key={i}>
                <line x1={xp} y1={PT} x2={xp} y2={PT+gH} stroke={isH?C.accent+"88":C.border} strokeWidth={isH?1:0.5}/>
                <text x={xp} y={CH-4} textAnchor="middle" fill={isH?C.accent:C.dim} fontSize="8.5" fontFamily="JetBrains Mono" fontWeight={isH?"700":"400"}>{d}</text>
              </g>
            );
          })}

          {regions.map(function(r){
            const isH=hovId===r.id,isFade=hovId!==null&&!isH;
            const inv=r.yields[6]<r.yields[4],stroke=inv?C.red:r.color;
            const d=getPath(r.yields);
            return(
              <g key={r.id} onMouseEnter={function(){setHovId(r.id);}} onMouseLeave={function(){setHovId(null);}} style={{cursor:"pointer"}}>
                <path d={d} fill="none" stroke="transparent" strokeWidth="12"/>
                <path d={d} fill="none" stroke={stroke} strokeWidth={isH?2.8:1.5} strokeLinejoin="round" strokeLinecap="round"
                  opacity={isFade?0.1:isH?1:0.65} style={{transition:"opacity .15s,stroke-width .1s"}}/>
                {r.yields.map(function(v,i){
                  const cx=xOf(i),cy=yOf(v),isDH=hovDur===i;
                  return <circle key={i} cx={cx} cy={cy} r={isH?(isDH?5:3.5):isDH?2.5:2}
                    fill={stroke} opacity={isFade?0.1:isH?1:isDH?0.9:0.55} style={{transition:"r .1s"}}/>;
                })}
                {isH&&(
                  <text x={xOf(DURATIONS.length-1)+5} y={yOf(r.yields[DURATIONS.length-1])+4}
                    fill={stroke} fontSize="8.5" fontFamily="JetBrains Mono" fontWeight="700">
                    {r.flag}{r.name}
                  </text>
                )}
              </g>
            );
          })}

          {hovDur!==null&&regions.map(function(r){
            const v=r.yields[hovDur];if(!v||v<=0)return null;
            const isH=hovId===r.id||hovId===null,xp=xOf(hovDur),yp=yOf(v);
            const inv=r.yields[6]<r.yields[4];
            return(
              <g key={r.id} opacity={isH?1:0.15}>
                <rect x={xp+5} y={yp-9} width={38} height={13} rx="2" fill={C.panel} stroke={inv?C.red:r.color} strokeWidth="0.8" opacity="0.95"/>
                <text x={xp+24} y={yp+1.5} textAnchor="middle" fill={inv?C.red:r.color} fontSize="8" fontFamily="JetBrains Mono" fontWeight="700">{v.toFixed(2)}%</text>
              </g>
            );
          })}

          <line x1={PL} y1={PT} x2={PL} y2={PT+gH} stroke={C.border} strokeWidth="1"/>
          <line x1={PL} y1={PT+gH} x2={CW-PR} y2={PT+gH} stroke={C.border} strokeWidth="1"/>
        </svg>
      </div>

      {/* 테이블 */}
      <div style={{overflowX:"auto",padding:"0 12px 10px"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontFamily:"JetBrains Mono",fontSize:8.5}}>
          <thead>
            <tr style={{borderBottom:`1px solid ${C.border}`}}>
              <th style={{padding:"4px 8px",textAlign:"left",color:C.muted,fontWeight:700,fontSize:7.5,whiteSpace:"nowrap"}}>국가</th>
              <th style={{padding:"4px 6px",textAlign:"center",color:C.accent,fontWeight:700,fontSize:7.5}}>기준금리</th>
              {DURATIONS.map(function(d,i){
                return(
                  <th key={d} onMouseEnter={function(){setHovDur(i);}} onMouseLeave={function(){setHovDur(null);}}
                    style={{padding:"4px 5px",textAlign:"center",cursor:"pointer",
                      color:hovDur===i?C.accent:C.muted,fontWeight:hovDur===i?700:400,fontSize:7.5,
                      background:hovDur===i?C.accent+"0d":"transparent",transition:"all .1s"}}>{d}</th>
                );
              })}
              <th style={{padding:"4px 6px",textAlign:"center",color:C.muted,fontWeight:700,fontSize:7.5}}>2Y↔10Y</th>
            </tr>
          </thead>
          <tbody>
            {regions.map(function(r,ri){
              const inv=r.yields[6]<r.yields[4];
              const spread=r.yields[6]&&r.yields[4]?+(r.yields[6]-r.yields[4]).toFixed(2):null;
              const isH=hovId===r.id;
              return(
                <tr key={r.id} onMouseEnter={function(){setHovId(r.id);}} onMouseLeave={function(){setHovId(null);}}
                  style={{background:isH?r.color+"10":ri%2===0?"transparent":C.panel2+"88",
                    borderBottom:`1px solid ${C.border}55`,cursor:"pointer",transition:"background .12s"}}>
                  <td style={{padding:"5px 8px",whiteSpace:"nowrap"}}>
                    <div style={{display:"flex",alignItems:"center",gap:5}}>
                      <span style={{fontSize:13}}>{r.flag}</span>
                      <div>
                        <div style={{color:isH?r.color:C.text,fontWeight:isH?700:400}}>{r.name}</div>
                        <div style={{fontSize:7,color:C.dim}}>{r.cbName}</div>
                      </div>
                    </div>
                  </td>
                  <td style={{padding:"5px 6px",textAlign:"center"}}>
                    <span style={{fontSize:10,fontWeight:700,color:r.color,background:r.color+"1a",
                      borderRadius:3,padding:"1px 5px"}}>{r.policyRate}%</span>
                  </td>
                  {r.yields.map(function(v,i){
                    const isDH=hovDur===i;
                    return(
                      <td key={i} style={{padding:"5px 4px",textAlign:"center",
                        background:isDH?C.accent+"0d":"transparent",transition:"background .1s"}}>
                        <span style={{color:isDH?C.accent:v>r.policyRate+1.5?C.green:v<r.policyRate-0.5?C.orange:C.text,
                          fontWeight:isDH?700:400}}>{v>0?v.toFixed(2):"—"}</span>
                      </td>
                    );
                  })}
                  <td style={{padding:"5px 6px",textAlign:"center"}}>
                    {spread!==null?(
                      <span style={{color:spread<0?C.red:spread<0.3?C.orange:C.green,fontWeight:700}}>
                        {spread>0?"+":""}{spread}%
                        {inv&&<span style={{display:"block",fontSize:6,color:C.red}}>⚠역전</span>}
                      </span>
                    ):"—"}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ── 공통 서브 컴포넌트 ── */
function MiniBarChart({data,colorFn,labelFn,valFn,height=60,showZero=true}){
  if(!data||data.length===0)return null;
  const vals=data.map(d=>valFn(d));
  const abs=vals.map(Math.abs);
  const mx=Math.max(...abs)||1;
  return(
    <div style={{display:"flex",alignItems:"flex-end",gap:2,height,paddingTop:4}}>
      {data.map((d,i)=>{
        const v=valFn(d),pos=v>=0,h=Math.max(Math.abs(v)/mx*(height-18),2);
        const col=colorFn(v,i,d);
        return(
          <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:0}}>
            <div style={{fontSize:5.5,color:col,fontFamily:"JetBrains Mono",
              transform:"rotate(-55deg) translateY(-1px)",whiteSpace:"nowrap",
              opacity:0.9,marginBottom:1,letterSpacing:0}}>
              {valFn(d)>0?"+":""}{typeof valFn(d)==="number"&&Math.abs(valFn(d))>=1000
                ?(valFn(d)/1000).toFixed(1)+"K"
                :valFn(d).toFixed(valFn(d)>100?0:1)}
            </div>
            <div style={{width:"100%",height:Math.max(h,2),background:col,
              borderRadius:"2px 2px 0 0",opacity:0.78,transition:"height .3s"}}/>
            <div style={{height:1,width:"100%",background:C.border}}/>
            <div style={{fontSize:5.5,color:C.dim,fontFamily:"JetBrains Mono",
              transform:"rotate(-40deg)",whiteSpace:"nowrap",marginTop:2}}>
              {labelFn(d,i)}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function StatCard({label,value,unit,sub,color,live,small}){

      <div style={{fontSize:7.5,color:C.dim,fontFamily:"JetBrains Mono",marginBottom:4,
        display:"flex",justifyContent:"space-between"}}>

        {live&&<span style={{color:C.green,fontSize:6.5}}>●</span>}

}

/* ── 탭1: 한국 수급 패널 ── */
function KoreaFlowTab({live}){
  const ecos=live.ecos||{};
  const fss=live.fss||{};
  const fred=live.fred||{};
  const av=live.av||{};

  const bop=ecos.bopMonthly||[];
  const fdi=ecos.fdiInflow||[];
  const fs=fss.foreignStock||[];
  const fxRes=ecos.fxReserves;
  const bond10y=ecos.bond10y;
  const bokRate=ecos.baseRate;
  const usKrSpread=bond10y&&fred.rate10y?+(fred.rate10y-bond10y).toFixed(2):null;
  const wtiVal=av.wti;
  const goldVal=av.gold;

  /* BOP 최신 3개 */
  const bopLast=bop.slice(-6);
  const bopLatest=bop.length>0?bop[bop.length-1]:null;
  const bopPrev  =bop.length>1?bop[bop.length-2]:null;
  const bopMom   =bopLatest&&bopPrev?(bopLatest.value-bopPrev.value).toFixed(0):null;

  /* FSS 최신 */
  const fsLatest=fs.length>0?fs[fs.length-1]:null;
  const fsPrev  =fs.length>1?fs[fs.length-2]:null;
  const fsMom   =fsLatest&&fsPrev?(fsLatest.stockNet-fsPrev.stockNet).toFixed(1):null;
  const fsLast6 =fs.slice(-6);

  /* FDI 최신 */
  const fdiLast=fdi.slice(-6);
  const fdiLatest=fdi.length>0?fdi[fdi.length-1]:null;

              <span style={{fontSize:9,color:C.text,fontFamily:"JetBrains Mono"}}>
                <span style={{color:corrColor(hover.v)}}>{CORR_ASSETS[hover.r]}</span>
                <span style={{color:C.muted}}> & </span>
                <span style={{color:corrColor(hover.v)}}>{CORR_ASSETS[hover.c]}</span>
                <span style={{color:C.muted}}>: </span>
                <span style={{color:corrColor(hover.v),fontWeight:700}}>{hover.v>0?"+":""}{hover.v.toFixed(2)}</span>
                <span style={{color:C.muted,fontSize:8}}> ({hover.v>0.7?"강한 양(+)":hover.v>0.3?"중간 양(+)":hover.v>-0.3?"거의 무관":hover.v>-0.7?"중간 음(-)":"강한 음(-)"})</span>

        </div>
        <div style={{display:"flex"}}>
          <div style={{display:"flex",flexDirection:"column",marginRight:4,marginTop:sz+gap+2}}>
            {CORR_ASSETS.map((a,i)=>(
              <div key={i} style={{height:sz+gap,display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:6}}>
                <span style={{fontSize:9,color:C.muted,fontFamily:"JetBrains Mono",whiteSpace:"nowrap"}}>{a}</span>
              </div>
            ))}
          </div>
          <div>
            <div style={{display:"flex",marginBottom:4}}>
              {CORR_ASSETS.map((a,i)=>(
                <div key={i} style={{width:sz+gap,overflow:"hidden",display:"flex",alignItems:"flex-end",justifyContent:"center",paddingBottom:4}}>
                  <span style={{fontSize:8,color:C.muted,fontFamily:"JetBrains Mono",writingMode:"vertical-rl",transform:"rotate(180deg)",whiteSpace:"nowrap"}}>{a}</span>
                </div>
              ))}
            </div>
            {CORR_MATRIX.map((row,r)=>(
              <div key={r} style={{display:"flex",gap:gap+"px",marginBottom:gap+"px"}}>
                {row.map((v,c)=>{
                  const col=corrColor(v),isH=hover&&hover.r===r&&hover.c===c;
                  return(
                    <div key={c}
                      onMouseEnter={()=>setHover({r,c,v})}
                      onMouseLeave={()=>setHover(null)}
                      style={{width:sz,height:sz,background:col+"33",border:`1px solid ${isH?col:col+"55"}`,
                        borderRadius:3,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
                        cursor:"pointer",transition:"all .15s",
                        boxShadow:isH?`0 0 10px ${col}66`:"none",transform:isH?"scale(1.08)":"scale(1)"}}>
                      <div style={{width:"70%",height:"70%",borderRadius:3,background:col,opacity:r===c?1:0.25+Math.abs(v)*0.6}}/>

                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════
   ARBITRAGE PANEL
════════════════════════════════════════════ */
function ArbitragePanel(){
  const typeColors={crypto:C.red,commodity:C.gold,rate:C.accent,equity:C.green,fx:C.purple,volatility:"#bb86fc"};
  const typeLabels={crypto:"암호화폐",commodity:"원자재",rate:"금리",equity:"주식",fx:"외환",volatility:"변동성"};
  const [filter,setFilter]=useState("all");
  const [live,setLive]=useState(window.__live||{});

  useEffect(()=>{
    const iv=setInterval(()=>{if(window.__live)setLive(Object.assign({},window.__live));},2000);
    return()=>clearInterval(iv);
  },[]);

  // FRED + ECOS 실데이터 반영: 금리차 전부 live 계산
  const liveArb=ARB_DATA.map(a=>{
    const fred=live.fred||{};
    const ecos=live.ecos||{};
    const av=live.av||{};
    const usT=fred.rate10y;
    const krT=ecos.bond10y;  // ECOS 실데이터
    if(a.name==="미-한 금리차"&&usT&&krT){
      const v=+(usT-krT).toFixed(2);
      return Object.assign({},a,{value:v,desc:`US 10Y(${usT}%) - KR 10Y(${krT}%)`,live:true});
    }
    if(a.name==="미-일 금리차"&&usT&&live.fredLive){
      const v=+(usT-0.72).toFixed(2);
      return Object.assign({},a,{value:v,desc:`US 10Y(${usT}%) - JP 10Y(0.72%)`,live:true});
    }
    if(a.name==="미-유 금리차"&&usT&&live.fredLive){
      const v=+(usT-2.65).toFixed(2);
      return Object.assign({},a,{value:v,desc:`US 10Y(${usT}%) - EU 10Y(2.65%)`,live:true});
    }
    if(a.name==="금/은 비율"&&av.gold&&av.silver&&av.gold>0&&av.silver>0){
      const v=+(av.gold/av.silver).toFixed(1);
      return Object.assign({},a,{value:v,desc:`Gold($${av.gold?.toFixed(0)}) / Silver($${av.silver?.toFixed(2)})`,live:true});
    }
    if(a.name==="원달러 캐리"&&krT&&usT){
      const v=+(krT-usT+fred.fedRate||0).toFixed(2);
      return Object.assign({},a,{value:Math.abs(v),live:live.ecosLive&&live.fredLive});
    }
    return a;
  });

  const filtered=filter==="all"?liveArb:liveArb.filter(a=>a.type===filter);
  return(
    <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:6,overflow:"hidden"}}>
      <div style={{padding:"8px 14px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:3,height:18,background:C.gold,borderRadius:2}}/>
          <span style={{fontFamily:"Space Grotesk",fontSize:11,fontWeight:700,color:C.gold,letterSpacing:"0.1em",textTransform:"uppercase"}}>아비트라지 기회</span>
          <span style={{fontSize:9,color:C.muted,fontFamily:"JetBrains Mono"}}>Cross-Market Arbitrage</span>
          {(live.fredLive||live.ecosLive)&&<span style={{fontSize:7.5,color:C.green,fontFamily:"JetBrains Mono"}}>● FRED+ECOS 금리차 실데이터 반영</span>}
          {live.avLive&&<span style={{fontSize:7.5,color:"#ffd700",fontFamily:"JetBrains Mono"}}>● AV 금/은 비율 실데이터</span>}
        </div>
        <div style={{display:"flex",gap:4}}>
          {["all","rate","crypto","commodity","equity","fx"].map(t=>(
            <button key={t} className={`btn${filter===t?" active":""}`} style={{padding:"2px 8px",fontSize:8}} onClick={()=>setFilter(t)}>
              {t==="all"?"전체":typeLabels[t]||t}
            </button>
          ))}
        </div>
      </div>
      <div style={{padding:"10px 12px",display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:8}}>
        {filtered.map(a=>{
          const tc=typeColors[a.type]||C.accent;
          const ratio=a.dir==="up"?a.value/a.threshold:a.threshold/a.value;
          const opportunity=ratio>0.9,pct=Math.min(ratio*100,100);
          return(
            <div key={a.name} style={{padding:"10px 12px",background:C.bg,borderRadius:6,
              border:`1px solid ${opportunity?tc+"66":C.border}`,
              boxShadow:opportunity?`0 0 12px ${tc}22`:"none"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:5}}>
                    <span style={{fontSize:11,color:tc,fontWeight:700,fontFamily:"JetBrains Mono"}}>{a.name}</span>
                    {a.live&&<span style={{fontSize:6.5,color:C.green,fontFamily:"JetBrains Mono"}}>● LIVE</span>}
                  </div>
                  <div style={{fontSize:8,color:C.muted,fontFamily:"JetBrains Mono"}}>{a.en}</div>
                </div>

  function genHist(base,vol,n=24){
    if(!r.current)r.current=seededR(Math.round(base*100));
    return Array.from({length:n},()=>+(base*(1+(r.current()-0.5)*vol*2)).toFixed(base>10?1:4));
  }
  const [hist,setHist]=useState({});
  useEffect(()=>{
    const go=async()=>{

      setHist({

/* ════════════════════════════════════════════
   📋 시장 브리핑 엔진 (로컬 규칙 기반)
   CORS 없이 브라우저에서 직접 실행
════════════════════════════════════════════ */
function generateBriefing(live){
  const fred=live.fred||{};
  const ecos=live.ecos||{};
  const av=live.av||{};
  const imf=(live.imf&&live.imf.gdp)||{};
  const fss=live.fss||{};

  // ── 핵심 지표 추출 ──
  const fedRate=fred.fedRate||4.25;
  const us10y=fred.rate10y||4.52;
  const us2y=fred.rate2y||4.18;
  const spread=+(us10y-us2y).toFixed(2);
  const cpi=fred.cpi||3.2;
  const unemp=fred.unemployment||4.1;
  const bokRate=ecos.baseRate||2.75;
  const kr10y=ecos.bond10y||3.02;
  const usKrSpread=+(us10y-kr10y).toFixed(2);
  const gold=av.gold||3018;
  const wti=av.wti||68;
  const goldSilver=av.silver>0?(av.gold/av.silver):90;
  const fssLatest=fss.foreignStock&&fss.foreignStock.length>0?fss.foreignStock[fss.foreignStock.length-1]:null;
  const gdpKr=imf.kr||2.1;
  const gdpUs=imf.us||2.8;
  const gdpCn=imf.cn||4.8;

  // ── 국면 판단 ──
  const isInverted=spread<0;
  const isTightening=fedRate>4.0;
  const isHighGold=gold>2500;
  const isHighOil=wti>85;
  const isLowOil=wti<65;
  const isForeignBuying=fssLatest&&fssLatest.stockNet>0;
  const isForeignSelling=fssLatest&&fssLatest.stockNet<-2000;
  const isHighCarry=usKrSpread>1.5;
  const isRiskOff=isHighGold&&(isInverted||cpi>4);
  const isRiskOn=!isInverted&&cpi<3.5&&unemp<4.5;
  const isGoldSilverHighRatio=goldSilver>85;

  // ── 국면 텍스트 ──
  let phase="";
  if(isInverted&&cpi>3){
    phase="현재 미국 수익률 곡선이 역전 상태("+spread+"%p)를 유지하며, CPI "+cpi+"%로 인플레이션 압력이 잔존합니다. Fed는 고금리를 장기 유지할 가능성이 높으며 글로벌 유동성이 제한된 환경입니다. 한국은 미-한 금리차("+usKrSpread+"%p)로 인한 자본 유출 압력에 노출되어 있습니다.";
  } else if(!isInverted&&cpi<3&&unemp<4.5){
    phase="미국 수익률 곡선이 정상화(스프레드 "+spread+"%p)되고 CPI "+cpi+"%로 인플레 둔화 흐름이 뚜렷합니다. Fed 피벗 기대가 살아 있으며 리스크 자산 전반에 우호적인 환경입니다. 한국 입장에서 BOK 금리("+bokRate+"%)+외국인 유입 가능성에 주목해야 할 시점입니다.";
  } else if(isRiskOff){
    phase="금(Gold $"+gold.toFixed(0)+")+고유가+금리 역전이 동시에 나타나며 전형적인 리스크오프 국면 신호가 혼재합니다. 안전자산 선호가 강화되는 환경으로, KOSPI 외국인 수급과 원달러 환율 방향이 핵심 변수입니다.";
  } else {
    phase="주요 거시지표가 혼재된 양상입니다. Fed 기준금리 "+fedRate+"%, 미국 10Y "+us10y+"%, 한국 BOK "+bokRate+"%로 각국 통화정책 방향성 차별화가 진행 중입니다. 당분간 개별 이벤트(FOMC·BOK 결정) 대응이 중요합니다.";
  }

  // ── 리스크 포인트 ──
  const risks=[];
  if(isInverted) risks.push("📌 미국 2Y-10Y 수익률 역전 지속("+spread+"%p) — 과거 사례 기준 6~18개월 내 경기침체 선행 지표, 크레딧 리스크 재평가 가능");
  if(cpi>3.5)    risks.push("📌 미국 CPI "+cpi+"% 목표(2%) 초과 지속 — Fed 금리 인하 지연 → 달러 강세 → 신흥국 자금 이탈 압력");
  if(isHighCarry) risks.push("📌 미-한 금리차 "+usKrSpread+"%p — 원화 약세·자본 유출 유인 구조 지속, BOK 선제적 인하 여력 제한");
  if(isForeignSelling) risks.push("📌 외국인 KOSPI 순매도 추세(최근월 "+fssLatest.stockNet+"억원) — 수급 공백 구간, 기관·개인 대응 필요");
  if(isHighOil)  risks.push("📌 WTI $"+wti.toFixed(1)+"/bbl 고유가 — 한국 수입물가 상승·경상수지 악화·인플레 재점화 리스크");
  if(gold>3000)  risks.push("📌 금 $"+gold.toFixed(0)+"/oz 사상 최고권 — 지정학·달러 신뢰 약화 반영, 글로벌 리스크오프 전환 선행지표로 모니터링");
  if(unemp>4.5)  risks.push("📌 미국 실업률 "+unemp+"% 상승 — 소비 둔화·기업 실적 하향 위험, 경기 연착륙 시나리오 재검토 필요");
  if(gdpCn<4)    risks.push("📌 중국 GDP 성장률 "+gdpCn+"% 둔화 — 한국 대중 수출 의존도(약 20%) 감안 시 반도체·화학 섹터 영향 주시");

  // ── 기회 포인트 ──
  const opps=[];
  if(isGoldSilverHighRatio) opps.push("💡 금/은 비율 "+goldSilver.toFixed(1)+"x 역사적 고점권 — 은(Silver) 상대 저평가 구간, 비율 정상화 시 은 아웃퍼폼 기대 가능");
  if(isForeignBuying)       opps.push("💡 외국인 KOSPI 순매수(최근월 +"+fssLatest.stockNet+"억원) — 수급 개선 모멘텀, 수출 대형주 중심 선별 접근 유효");
  if(isLowOil)              opps.push("💡 WTI $"+wti.toFixed(1)+"/bbl 저유가 — 한국 수입 비용 절감·경상수지 개선 기대, 항공·화학·정유 섹터 수혜 점검");
  if(!isInverted&&spread>0.3) opps.push("💡 미국 수익률 곡선 정상화(+"+spread+"%p) — 장기채 매력 회복 구간, 듀레이션 확대 전략 검토 시점");
  if(gdpKr>=2&&bokRate<fedRate) opps.push("💡 한국 GDP "+gdpKr+"% + BOK 금리 여유("+bokRate+"%) — 주변국 대비 상대적 통화정책 유연성 보유, KOSPI 밸류에이션 매력 부각 가능");
  if(gdpCn>=4.5) opps.push("💡 중국 GDP "+gdpCn+"% 성장 유지 — 한국 대중 수출 수혜 섹터(반도체·2차전지·기계) 모멘텀 체크");
  if(av.natgas>0&&av.natgasC>2) opps.push("💡 천연가스 +"+av.natgasC.toFixed(1)+"% 급등 — 에너지 전환·LNG 관련 한국 조선·플랜트 섹터 수혜 가능성");

  // 최소 2개 확보
  if(opps.length===0) opps.push("💡 현 국면에서 달러·단기채 비중 확대로 변동성 방어 전략 유효","💡 금(Gold) 헤지 비중 일부 유지로 지정학·인플레 리스크 분산 권고");

  // ── 한줄 요약 ──
  let summary="";
  if(isInverted&&cpi>3)   summary="🔴 리스크 경계 국면 — 달러 현금+금 헤지 유지, KOSPI 외국인 수급 일별 모니터링 우선";
  else if(isRiskOn)        summary="🟢 리스크온 환경 — 성장주·KOSPI 비중 확대 검토, 단 Fed 피벗 시점 불확실성 관리 병행";
  else if(isHighGold)      summary="🟡 혼조 국면 — 안전자산(금·달러) 방어 기조 유지하되 KOSPI 저점 매수 기회 포착 전략 병행";
  else                     summary="🟡 중립·관망 국면 — FOMC·BOK 결정 전 포지션 중립, 이벤트 결과 후 방향성 추종 전략 권고";

  return {phase,risks:risks.slice(0,3),opps:opps.slice(0,2),summary};
}

function AIBriefingPanel(){
  const [brief,setBrief]=useState(null);
  const [loading,setLoading]=useState(false);
  const [expanded,setExpanded]=useState(false);
  const [live,setLive]=useState(window.__live||{});
  const [genTime,setGenTime]=useState(null);

  useEffect(()=>{
    const iv=setInterval(()=>{if(window.__live)setLive(Object.assign({},window.__live));},2000);
    return()=>clearInterval(iv);
  },[]);

  // 데이터가 처음 준비되면 자동 실행
  const prevReady=useRef(false);
  useEffect(()=>{
    const ready=live.fredLive||live.ecosLive;
    if(ready&&!prevReady.current&&!brief){
      prevReady.current=true;
      runBriefing();
    }
  },[live.fredLive,live.ecosLive]);

  function runBriefing(){
    setLoading(true);setBrief(null);setExpanded(true);
    // 짧은 딜레이로 "분석 중" 효과
    setTimeout(()=>{
      const result=generateBriefing(window.__live||live);
      setBrief(result);
      setGenTime(new Date());
      setLoading(false);
    },820);
  }

  const dataReady=live.fredLive||live.ecosLive;
  const dataSources=[
    live.fredLive&&"FRED",live.ecosLive&&"ECOS",live.avLive&&"AV",live.imfLive&&"IMF",live.fssLive&&"FSS"
  ].filter(Boolean).join(" · ");

  return(
    <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden"}}>

      {/* 헤더 */}
      <div style={{padding:"9px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",
        background:expanded?"#080d1a":C.panel2,borderBottom:expanded?`1px solid ${C.border}`:"none",
        transition:"background .2s"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:3,height:22,background:C.purple,borderRadius:2}}/>
          <span style={{fontFamily:"Space Grotesk",fontSize:13,fontWeight:700,color:C.purple,letterSpacing:"0.06em"}}>📋 매크로 시장 브리핑</span>
          <span style={{fontSize:9,color:C.muted,fontFamily:"JetBrains Mono"}}>실시간 데이터 자동 분석 · FRED+ECOS+AV+IMF+FSS</span>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {genTime&&<span style={{fontSize:8,color:C.dim,fontFamily:"JetBrains Mono"}}>{genTime.toLocaleTimeString("ko-KR",{hour12:false})} 생성</span>}
          {!dataReady&&<span style={{fontSize:8,color:C.orange,fontFamily:"JetBrains Mono"}}>○ 데이터 로딩 중...</span>}
          {dataReady&&<span style={{fontSize:8,color:C.green,fontFamily:"JetBrains Mono"}}>● {dataSources}</span>}
          <button onClick={runBriefing} disabled={loading} style={{
            padding:"5px 14px",borderRadius:5,border:`1px solid ${C.purple}`,
            background:loading?C.purple+"11":C.purple+"22",color:loading?C.dim:C.purple,
            fontFamily:"JetBrains Mono",fontSize:10,fontWeight:700,
            cursor:loading?"default":"pointer",transition:"all .15s",letterSpacing:"0.05em"
          }}>
            {loading?"◌ 분석 중...":"🔄 재분석"}
          </button>
          <button onClick={()=>setExpanded(e=>!e)} style={{
            padding:"4px 10px",borderRadius:4,border:`1px solid ${C.border}`,
            background:"transparent",color:C.muted,fontFamily:"JetBrains Mono",
            fontSize:9,cursor:"pointer"
          }}>{expanded?"▲ 접기":"▼ 펼치기"}</button>
        </div>
      </div>

      {expanded&&(
        <div style={{padding:"14px 18px"}}>

          {/* 로딩 */}
          {loading&&(
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {["현재 시장 국면 분석 중...","리스크 포인트 평가 중...","기회 요인 탐색 중..."].map((t,i)=>(
                <div key={i} style={{height:14,background:C.border,borderRadius:4,overflow:"hidden",position:"relative"}}>
                  <div style={{
                    position:"absolute",top:0,left:0,height:"100%",width:"60%",
                    background:`linear-gradient(90deg, transparent, ${C.purple}44, transparent)`,
                    animation:"shimmer 1.2s infinite",
                    transform:"translateX(-100%)",
                  }}/>
                  <span style={{position:"absolute",left:10,top:0,fontSize:8,color:C.dim,lineHeight:"14px",fontFamily:"JetBrains Mono"}}>{t}</span>
                </div>
              ))}
            </div>
          )}

          {/* 대기 */}
          {!brief&&!loading&&(
            <div style={{textAlign:"center",padding:"20px 0",color:C.dim,fontFamily:"JetBrains Mono",fontSize:10}}>
              데이터 수신 후 자동으로 분석을 시작합니다...
            </div>
          )}

          {/* 결과 */}
          {brief&&!loading&&(
            <div style={{display:"flex",flexDirection:"column",gap:10}}>

              {/* ① 현재 국면 */}
              <div style={{padding:"12px 14px",background:"#060b16",borderRadius:6,
                border:`1px solid ${C.purple}44`,borderLeft:`3px solid ${C.purple}`}}>
                <div style={{fontSize:8.5,color:C.purple,fontFamily:"JetBrains Mono",fontWeight:700,marginBottom:7,
                  letterSpacing:"0.12em",textTransform:"uppercase"}}>① 현재 시장 국면</div>
                <div style={{color:C.text,fontFamily:"JetBrains Mono",fontSize:11,lineHeight:1.75}}>{brief.phase}</div>
              </div>

              {/* ② 리스크 + ③ 기회 나란히 */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div style={{padding:"12px 14px",background:"#060b16",borderRadius:6,
                  border:`1px solid ${C.red}33`,borderLeft:`3px solid ${C.red}`}}>
                  <div style={{fontSize:8.5,color:C.red,fontFamily:"JetBrains Mono",fontWeight:700,marginBottom:8,
                    letterSpacing:"0.12em",textTransform:"uppercase"}}>② 주목할 리스크</div>
                  <div style={{display:"flex",flexDirection:"column",gap:8}}>
                    {brief.risks.map((r,i)=>(
                      <div key={i} style={{fontSize:10.5,color:"#d0dbe8",fontFamily:"JetBrains Mono",lineHeight:1.65,
                        paddingBottom:i<brief.risks.length-1?8:0,
                        borderBottom:i<brief.risks.length-1?`1px solid ${C.border}`:"none"}}>{r}</div>
                    ))}
                  </div>
                </div>
                <div style={{padding:"12px 14px",background:"#060b16",borderRadius:6,
                  border:`1px solid ${C.green}33`,borderLeft:`3px solid ${C.green}`}}>
                  <div style={{fontSize:8.5,color:C.green,fontFamily:"JetBrains Mono",fontWeight:700,marginBottom:8,
                    letterSpacing:"0.12em",textTransform:"uppercase"}}>③ 기회 포인트</div>
                  <div style={{display:"flex",flexDirection:"column",gap:8}}>
                    {brief.opps.map((o,i)=>(
                      <div key={i} style={{fontSize:10.5,color:"#d0dbe8",fontFamily:"JetBrains Mono",lineHeight:1.65,
                        paddingBottom:i<brief.opps.length-1?8:0,
                        borderBottom:i<brief.opps.length-1?`1px solid ${C.border}`:"none"}}>{o}</div>
                    ))}
                  </div>
                </div>
              </div>

              {/* ④ 한줄 요약 */}
              <div style={{padding:"10px 14px",background:"#07111e",borderRadius:6,
                border:`1px solid ${C.gold}44`,display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:3,height:36,background:C.gold,borderRadius:2,flexShrink:0}}/>
                <div>
                  <div style={{fontSize:8,color:C.gold,fontFamily:"JetBrains Mono",fontWeight:700,
                    letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:4}}>④ 한줄 요약</div>
                  <div style={{color:C.gold,fontFamily:"JetBrains Mono",fontSize:11.5,fontWeight:700,lineHeight:1.5}}>{brief.summary}</div>
                </div>
              </div>

              {/* 데이터 출처 */}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                paddingTop:6,fontSize:8,color:C.dim,fontFamily:"JetBrains Mono"}}>
                <span>📊 데이터 기반: {dataSources||"대기 중"} · 규칙 기반 자동 생성</span>
                <span>⚠ 참고용 · 투자 결정 전 전문가 확인 필요</span>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}
